<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2DIO ERA — CRM v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#111;min-height:100vh}
.topbar{background:#111;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:500}
.topbar h1{font-size:15px;font-weight:600}
.topbar-right{display:flex;gap:10px;align-items:center;font-size:12px}
.at-status{font-size:11px;padding:3px 8px;border-radius:12px;background:#222}
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:42px;z-index:499}
.tab-btn{padding:10px 13px;font-size:11px;font-weight:500;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;position:relative;font-family:inherit}
.tab-btn.active{color:#378ADD;border-bottom-color:#378ADD}
.tab-btn .badge{background:#EF4444;color:#fff;font-size:8px;font-weight:700;border-radius:8px;padding:1px 4px;position:absolute;top:5px;right:2px}
.content{padding:18px;max-width:100%;overflow-x:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-head h2{font-size:18px;font-weight:500}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.kcard{background:#fff;border-radius:8px;padding:14px 16px;flex:1;min-width:140px;border:1px solid #e5e7eb}
.kcard .lbl{font-size:11px;color:#888;margin-bottom:5px}
.kcard .val{font-size:20px;font-weight:600}
.kcard .sub{font-size:11px;color:#888;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.card{background:#fff;border-radius:10px;padding:14px;border:1px solid #e5e7eb}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.btn-primary{background:#378ADD;color:#fff}
.btn-success{background:#10B981;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-wa{background:#25D366;color:#fff}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-ghost{background:none;border:1px solid #e5e7eb}
input,select,textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #e5e7eb;font-size:13px;font-family:inherit;background:#fff;color:#111}
textarea{resize:vertical}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;white-space:nowrap}
.chip{display:inline-block;background:#f5f5f5;color:#666;font-size:11px;padding:2px 7px;border-radius:12px;margin-right:3px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:5px 7px;font-weight:500;color:#888;font-size:11px;border-bottom:1px solid #e5e7eb}
td{padding:6px 7px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#fafafa}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-wide{max-width:860px}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e5e7eb}
.modal-head h3{font-size:15px;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#888}
.modal-body{padding:20px;max-height:78vh;overflow-y:auto}
.lead-detail{position:fixed;inset:0;background:#fff;z-index:2000;overflow-y:auto}
.ld-topbar{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid #e5e7eb;background:#fff;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.pipeline-bar{padding:12px 16px;border-bottom:1px solid #e5e7eb;overflow-x:auto}
.pipeline-stages{display:flex;align-items:center;min-width:560px;margin-bottom:10px}
.ps-item{display:flex;flex-direction:column;align-items:center;flex:1;cursor:pointer}
.ps-dot{width:24px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.ps-label{font-size:9px;margin-top:2px;text-align:center;max-width:68px}
.ps-line{flex:1;height:2px;margin:0 3px;margin-bottom:16px}
.ld-stats{display:flex;gap:8px;padding:8px 16px;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;background:#f9fafb}
.stat-chip{background:#fff;border-radius:7px;padding:5px 10px;font-size:11px;border:1px solid #e5e7eb}
.stat-chip .sl{color:#888}
.stat-chip .sv{font-weight:600}
.ld-tabs{display:flex;border-bottom:1px solid #e5e7eb;padding:0 16px}
.ld-tab{padding:9px 12px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.ld-tab.active{color:#378ADD;border-bottom-color:#378ADD}
.ld-body{padding:16px}
.wa-preview{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;display:flex;align-items:center;justify-content:center;padding:16px}
.wa-box{background:#fff;border-radius:14px;max-width:440px;width:100%;overflow:hidden}
.wa-head{background:#25D366;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px}
.wa-msg{background:#DCF8C6;margin:14px;padding:12px;border-radius:10px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;font-family:inherit}
.pbar-wrap{background:#e5e7eb;border-radius:8px;height:8px;overflow:hidden}
.pbar-fill{height:100%;border-radius:8px;transition:width 0.4s}
.toggle{display:inline-flex;width:36px;height:20px;border-radius:10px;cursor:pointer;align-items:center;padding:0 3px;transition:background .2s;flex-shrink:0;border:none}
.toggle-knob{width:14px;height:14px;border-radius:7px;background:#fff;transition:transform .2s;display:block}
.alert-banner{padding:9px 14px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.needle-card{background:#fff;border-radius:10px;padding:12px;border:1px solid #e5e7eb}
.needle-pct{font-size:24px;font-weight:700;margin:3px 0}
.ins-card{background:#fff;border-radius:10px;padding:12px;border:1px solid #e5e7eb}
.mc-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.mc-chip{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #e5e7eb}
.hidden{display:none!important}
.empty{text-align:center;padding:40px;color:#888;font-size:14px}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}.kcard{min-width:130px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="ld" class="lead-detail hidden"></div>
<div id="modal-bg" class="modal-bg hidden"></div>
<div id="wa-overlay" class="wa-preview hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>



const SERVICES=['Photography','Videography','Photo & Video','Cinematography','Drone','Studio Rental','Reels','Event Coverage','Product Shoot','Portrait','Fashion','Wedding'];
const CITIES=['Delhi NCR','Noida','Gurugram','Faridabad','Ghaziabad','South Delhi','Connaught Place','Dwarka','Mumbai','Bengaluru','Hyderabad','Chennai','Pune','Kolkata','Jaipur','Chandigarh','Other'];
const VTIERS=['Verified Pro','Verified','New Partner','Suspended'];
const VCATS=['Photographer','Videographer','Cinematographer','Drone Operator','Studio','Editor','Reels Creator','Multi-skill'];
const BSTATUS=['New Inquiry','Lead Qualified','Vendor Matched','Quote Sent','Negotiating','Confirmed','Advance Paid','Shoot Completed','Editing','Delivered','Closed','Cancelled'];
const SC={'New Inquiry':'#3B82F6','Lead Qualified':'#8B5CF6','Vendor Matched':'#F59E0B','Quote Sent':'#F97316','Negotiating':'#EF4444','Confirmed':'#10B981','Advance Paid':'#059669','Shoot Completed':'#1D9E75','Editing':'#0EA5E9','Delivered':'#6366F1','Closed':'#064E3B','Cancelled':'#6B7280'};
const PC={'Urgent':'#EF4444','High':'#F97316','Medium':'#3B82F6','Low':'#6B7280'};
const PRIORITIES=['Urgent','High','Medium','Low'];
const SOURCES=['Instagram','Facebook','Google','Referral','Website','WhatsApp','JustDial','Walk-in','Partner Referral','Other'];
const ECATS=['Tech & Platform','Salaries','Marketing','Office & Utilities','Travel','Legal & Compliance','Equipment','Events','Misc'];
const PIPELINE=['New Inquiry','Vendor Matched','Quote Sent','Advance Paid','Shoot Completed','Delivered','Closed'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const AT_BASE='appfJtOaBCSpLQ1GN';
const TABS=[
  {id:'dashboard',lbl:'🏠 Dashboard'},{id:'leads',lbl:'📋 Leads'},
  {id:'bookings',lbl:'📅 Bookings'},{id:'vendors',lbl:'👥 Vendors'},
  {id:'payouts',lbl:'💸 Payouts'},{id:'profit',lbl:'📊 P&L'},
  {id:'ads',lbl:'📣 Ads'},{id:'followups',lbl:'🔔 Follow-ups'},
  {id:'analytics',lbl:'📈 Analytics'},{id:'breakeven',lbl:'🎯 Break-even'},
  {id:'needle',lbl:'📉 Needle'},{id:'targets',lbl:'🚩 Targets'},
  {id:'bizhealth',lbl:'🩺 Health'},{id:'quotation',lbl:'📄 Quotation'},
  {id:'investor',lbl:'💼 Investor'},{id:'creators',lbl:'🔍 Creators'},
  {id:'help',lbl:'❓ Help'}
];


const S={
  tab:'dashboard', vendors:[], bookings:[], expenses:[], ads:[], targets:{},
  lead:null, leadTab:'timeline',
  bFilter:'All', bSearch:'', vSearch:'',
  needle:'week', helpOpen:-1,
  atToken:'', atStatus:'idle',
  cf:{city:'',service:'',maxPrice:''},
  qItems:[{id:uid(),section:'Photography/Videography',desc:'',qty:1,rate:0}],
  qGst:false, qNotes:'', qBId:'',
  charts:{},
  modal:null, modalData:{}
};


function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function INRf(v){return '₹'+(Number(v)||0).toLocaleString('en-IN')}
function today(){return new Date().toISOString().split('T')[0]}
function dfn(d){if(!d)return null;return Math.round((new Date(d)-new Date())/86400000)}
function thisMonth(){return new Date().toISOString().slice(0,7)}
function lastMonth(){const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7)}
function thisWkStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split('T')[0]}
function lastWkStart(){const d=new Date();d.setDate(d.getDate()-d.getDay()-7);return d.toISOString().split('T')[0]}
function lastWkEnd(){const d=new Date();d.setDate(d.getDate()-d.getDay()-1);return d.toISOString().split('T')[0]}
function nextLeadNo(){const n=new Date(),y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,'0'),pfx=`S2E-${y}-${m}-`;const c=S.bookings.filter(b=>b.bookingNo&&b.bookingNo.startsWith(pfx)).length;return pfx+String(c+1).padStart(3,'0')}
function gV(id){return S.vendors.find(v=>v.id===id)||null}
function gB(id){return S.bookings.find(b=>b.id===id)||null}
function save(k,v){try{localStorage.setItem('s2e_'+k,JSON.stringify(v));}catch(e){}}
function load(k,def){try{const v=localStorage.getItem('s2e_'+k);return v?JSON.parse(v):def;}catch(e){return def;}}
function pct(a,b){return b?Math.min(100,Math.round(a/b*100)):0}
function needle(c,p){return p===0?null:Math.round(((c-p)/p)*100)}
function badge(lbl,color){return `<span class="badge" style="background:${color}22;color:${color}">${lbl}</span>`}
function chip(lbl){return `<span class="chip">${lbl}</span>`}
function pbar(p,color,h){return `<div class="pbar-wrap" style="height:${h||8}px"><div class="pbar-fill" style="width:${Math.min(100,Math.max(0,p))}%;background:${color||'#10B981'}"></div></div>`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}


function initData(){
  S.vendors=load('s2_v',[]);
  S.bookings=load('s2_b',[]);
  S.expenses=load('s2_e',[]);
  S.ads=load('s2_a',[]);
  S.targets=load('s2_t',{});
  S.atToken=localStorage.getItem('s2e_at')||'';
}
function savV(){save('s2_v',S.vendors)}
function savB(){save('s2_b',S.bookings)}
function savE(){save('s2_e',S.expenses)}
function savA(){save('s2_a',S.ads)}
function savT(){save('s2_t',S.targets)}
async function atSync(table,method,rid,fields){
  if(!S.atToken)return;
  setAtStatus('syncing');
  try{
    const url=`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}${rid?'/'+rid:''}`;
    const r=await fetch(url,{method,headers:{'Authorization':'Bearer '+S.atToken,'Content-Type':'application/json'},body:JSON.stringify({fields})});
    const d=await r.json();
    setAtStatus(d.error?'error':'ok');
    setTimeout(()=>setAtStatus('idle'),3000);
  }catch(e){setAtStatus('error');}
}
function setAtStatus(s){S.atStatus=s;const el=document.getElementById('at-status');if(el){el.textContent=s==='syncing'?'⟳ Syncing':s==='ok'?'✓ Synced':s==='error'?'✕ Error':'';el.style.color=s==='ok'?'#10B981':s==='error'?'#EF4444':'#F59E0B';}}


function waMsg(stage,b){
  const v=gV(b.vendorId);const vn=v?v.name:'Being assigned';
  const n=b.clientName,id=b.bookingNo,svc=b.service,city=b.city,date=b.shootDate||'TBD';
  const quot=INRf(b.quotedAmount),adv=INRf(b.advancePaid||Math.round((b.quotedAmount||0)*0.3));
  const bal=INRf((b.quotedAmount||0)-(b.totalCollected||0));
  const dels=(b.deliverables||[]).map(d=>`• ${d.name}: ${d.driveLink}`).join('\n')||'Drive link to be shared';
  const msgs={
    'New Inquiry':`Hi ${n}! 👋\n\nThank you for reaching out to *S2DIO ERA*! 🎬\n\n📋 *Lead ID:* ${id}\n📸 Service: ${svc}\n📍 City: ${city}\n📅 Date: ${date}\n\nWe are matching you with the best creator. Back within 2 hours! ⚡\n\n_Team S2DIO ERA_ | s2dioera.com`,
    'Quote Sent':`Hi ${n}! 😊\n\nYour *Quotation is Ready*!\n\n📋 *${id}*\n📸 ${svc} | 📍 ${city}\n📅 Date: ${date}\n\n💰 *Package: ${quot}*\n\n💳 *Advance to confirm: ${adv}*\nPay via UPI to lock your slot! 🔒\n\n_Team S2DIO ERA_`,
    'Advance Paid':`Hi ${n}! 🎊\n\n*BOOKING CONFIRMED!* 🎉\n\n✅ *${id}*\n👨‍📷 Creator: *${vn}*\n📅 ${date} | 📍 ${city}\n\n💳 Balance due: ${bal}\n\n_Team S2DIO ERA_ 📸`,
    'Shoot Completed':`Hi ${n}! 🌟\n\nYour shoot is *DONE!* 🎬✅\n\n📋 ${id}\n✏️ Editing in progress — delivery by *${b.deliveryDue||'as agreed'}*\n💳 *Final Payment: ${bal}*\n\n_Team S2DIO ERA_ 🙏`,
    'Delivered':`Hi ${n}! 🎊\n\n*Your content is DELIVERED!* ✨\n\n📂 *Your files:*\n${dels}\n\n📋 ${id}\n\n⭐ *Leave us a Google review!* 🙏\n${b.googleReviewLink||''}\n\nThank you for choosing S2DIO ERA! ❤️`
  };
  return msgs[stage]||msgs['New Inquiry'];
}
function showWA(stage,bid){
  const b=gB(bid);if(!b)return;
  const msg=waMsg(stage,b);
  document.getElementById('wa-overlay').innerHTML=`
    <div class="wa-box">
      <div class="wa-head">📱 WhatsApp — ${stage}<button onclick="closeWA()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer">✕</button></div>
      <div class="wa-msg">${esc(msg)}</div>
      <div style="display:flex;gap:8px;padding:0 14px 14px">
        <button class="btn btn-wa" style="flex:1" onclick="copyWA(this,'${bid}','${stage}')">📋 Copy</button>
        <button class="btn btn-ghost" style="flex:1" onclick="closeWA()">Done</button>
      </div>
    </div>`;
  document.getElementById('wa-overlay').classList.remove('hidden');
}
function copyWA(btn,bid,stage){const b=gB(bid);if(!b)return;navigator.clipboard.writeText(waMsg(stage,b)).then(()=>{btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2000);});}
function closeWA(){document.getElementById('wa-overlay').classList.add('hidden')}


/* ═══ MAIN RENDER ═══ */
function render(){
  const dueFU=S.bookings.flatMap(b=>(b.followUps||[]).filter(f=>!f.done&&dfn(f.date)<=0));
  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <h1>S2DIO ERA — CRM v2</h1>
      <div class="topbar-right">
        <span id="at-status" class="at-status"></span>
        <a href="index.html" style="color:#888;text-decoration:none;font-size:11px">← Inquiry Form</a>
      </div>
    </div>
    <div class="tabs">
      ${TABS.map(t=>`<button class="tab-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.lbl}${t.id==='followups'&&dueFU.length>0?`<span class="badge">${dueFU.length}</span>`:''}</button>`).join('')}
    </div>
    <div class="content" id="tab-content"></div>`;
  renderTab();
  if(S.lead) renderLeadDetail();
}

function setTab(t){S.tab=t;render()}

function renderTab(){
  const el=document.getElementById('tab-content');
  if(!el)return;
  const fns={dashboard:rDash,leads:rLeads,bookings:rBookings,vendors:rVendors,payouts:rPayouts,profit:rPnL,ads:rAds,followups:rFU,analytics:rAnalytics,breakeven:rBreakeven,needle:rNeedle,targets:rTargets,bizhealth:rBizHealth,quotation:rQuotation,investor:rInvestor,creators:rCreators,help:rHelp};
  const fn=fns[S.tab]||rDash;
  el.innerHTML=fn();
  setTimeout(()=>renderCharts(),50);
}

/* ═══ DASHBOARD ═══ */
function rDash(){
  const tm=S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(thisMonth()));
  const lm=S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(lastMonth()));
  const tw=S.bookings.filter(b=>b.createdAt&&b.createdAt>=thisWkStart());
  const lw=S.bookings.filter(b=>b.createdAt&&b.createdAt>=lastWkStart()&&b.createdAt<=lastWkEnd());
  const gp=S.bookings.reduce((s,b)=>s+b.platformMargin,0);
  const te=S.expenses.reduce((s,e)=>s+e.amount,0);
  const np=S.bookings.filter(b=>['Closed','Delivered'].includes(b.status)).reduce((s,b)=>s+b.platformMargin,0)-te;
  const pv=S.bookings.filter(b=>!['Closed','Cancelled'].includes(b.status)).reduce((s,b)=>s+(b.quotedAmount||0),0);
  const pvp=S.bookings.reduce((s,b)=>s+((b.vendorCost||0)-(b.totalPaidVendor||0)),0);
  const pcp=S.bookings.filter(b=>!['Closed','Cancelled'].includes(b.status)).reduce((s,b)=>s+((b.quotedAmount||0)-(b.totalCollected||0)),0);
  const dueFU=S.bookings.flatMap(b=>(b.followUps||[]).filter(f=>!f.done&&dfn(f.date)<=0));
  const wCl=tw.length,wPl=lw.length,wCr=tw.reduce((s,b)=>s+b.totalCollected,0),wPr=lw.reduce((s,b)=>s+b.totalCollected,0);
  const tgt=S.targets[thisMonth()]||{};
  const achR=tm.reduce((s,b)=>s+b.totalCollected,0),achB=tm.filter(b=>['Confirmed','Advance Paid','Shoot Completed','Delivered','Closed'].includes(b.status)).length;
  const dom=new Date().getDate(),dim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate(),pace=dom/dim;
  const nl=needle(wCl,wPl),nr=needle(wCr,wPr);
  return `
    ${dueFU.length>0?`<div class="alert-banner" style="background:#FEF3C7;border:1px solid #F59E0B;color:#92400E">⚠️ <strong>${dueFU.length} overdue follow-up${dueFU.length>1?'s':''}</strong> <button class="btn btn-sm" style="margin-left:auto;background:#F59E0B;color:#fff" onclick="setTab('followups')">View</button></div>`:''}
    <div class="card" style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:600;color:#888;margin-bottom:7px">📉 NEEDLE — WEEK OVER WEEK</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        ${[['Leads',wCl,wPl],['Revenue',wCr,wPr]].map(([lbl,c,p])=>{const pct=needle(c,p);const good=pct===null?null:pct>0;return`<div style="flex:1;min-width:90px;text-align:center"><div style="font-size:11px;color:#888">${lbl}</div><div style="font-size:15px;font-weight:700;color:${pct===null?'#111':good?'#10B981':'#EF4444'}">${pct===null?'—':`${pct>0?'+':''}${pct}%`}</div><div style="font-size:10px;color:#888">${lbl==='Revenue'?INRf(c):c} vs ${lbl==='Revenue'?INRf(p):p}</div></div>`;}).join('')}
      </div>
    </div>

/* ═══ BREAK-EVEN ═══ */
function rBreakeven(){
  const tm=S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(thisMonth()));
  const fc=S.expenses.filter(e=>e.type==='fixed'&&e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0);
  const cl=tm.filter(b=>['Confirmed','Advance Paid','Shoot Completed','Delivered','Closed'].includes(b.status));
  const am=cl.length?cl.reduce((s,b)=>s+b.platformMargin,0)/cl.length:0;
  const beB=fc&&am?Math.ceil(fc/am):0;
  const cur=cl.length,rem=Math.max(0,beB-cur),p=beB?pct(cur,beB):0;
  return `
    <div class="section-head"><h2>🎯 Break-even Analysis</h2></div>
    <div class="kpi-row" style="margin-bottom:14px">
      <div class="kcard"><div class="lbl">Fixed Costs MTD</div><div class="val" style="color:#EF4444">${INRf(fc)}</div></div>
      <div class="kcard"><div class="lbl">Avg Margin/Booking</div><div class="val" style="color:#10B981">${INRf(am)}</div></div>
      <div class="kcard"><div class="lbl">Break-even Bookings</div><div class="val" style="color:#F59E0B">${beB}</div></div>
      <div class="kcard"><div class="lbl">Bookings Closed</div><div class="val" style="color:#378ADD">${cur}</div></div>
      <div class="kcard"><div class="lbl">Still Needed</div><div class="val" style="color:${rem===0?'#10B981':'#EF4444'}">${rem}${rem===0?' ✅':''}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px"><span>Break-even Progress</span><span style="font-weight:700;color:${p>=100?'#10B981':'#F59E0B'}">${p}%${p>=100?' ✅':''}</span></div>
      ${pbar(p,p>=100?'#10B981':p>=50?'#F59E0B':'#EF4444',14)}
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:5px"><span>${cur} done</span><span>Target: ${beB}</span></div>
    </div>
    <div class="card"><div style="font-size:12px;font-weight:500;color:#888;margin-bottom:8px">Cumulative Margin vs Fixed Cost (MTD)</div><canvas id="ch-be" height="200"></canvas></div>`;
}

/* ═══ NEEDLE ═══ */
function rNeedle(){
  const iw=S.needle==='week';
  const cur=iw?S.bookings.filter(b=>b.createdAt&&b.createdAt>=thisWkStart()):S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(thisMonth()));
  const prev=iw?S.bookings.filter(b=>b.createdAt&&b.createdAt>=lastWkStart()&&b.createdAt<=lastWkEnd()):S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(lastMonth()));
  const ms=[
    {l:'New Leads',c:cur.length,p:prev.length,inv:false,f:v=>v},
    {l:'Confirmed Bookings',c:cur.filter(b=>['Confirmed','Advance Paid','Delivered','Closed'].includes(b.status)).length,p:prev.filter(b=>['Confirmed','Advance Paid','Delivered','Closed'].includes(b.status)).length,inv:false,f:v=>v},
    {l:'Revenue Collected',c:cur.reduce((s,b)=>s+b.totalCollected,0),p:prev.reduce((s,b)=>s+b.totalCollected,0),inv:false,f:INRf},
    {l:'Avg Deal Size',c:cur.length?Math.round(cur.reduce((s,b)=>s+b.quotedAmount,0)/cur.length):0,p:prev.length?Math.round(prev.reduce((s,b)=>s+b.quotedAmount,0)/prev.length):0,inv:false,f:INRf},
    {l:'Total Expenses',c:S.expenses.filter(e=>iw?e.date>=thisWkStart():e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0),p:S.expenses.filter(e=>iw?(e.date>=lastWkStart()&&e.date<=lastWkEnd()):e.date.startsWith(lastMonth())).reduce((s,e)=>s+e.amount,0),inv:true,f:INRf},
    {l:'Platform Margin',c:cur.reduce((s,b)=>s+b.platformMargin,0),p:prev.reduce((s,b)=>s+b.platformMargin,0),inv:false,f:INRf},
  ];
  return `
    <div class="section-head"><h2>📉 Needle Movement</h2>
      <div style="display:flex;gap:3px;background:#f5f5f5;border-radius:8px;padding:3px">

    </div>`;
}

/* ═══ TARGETS ═══ */
function rTargets(){
  const tgt=S.targets[thisMonth()]||{};

  const ach={revenue:tm.reduce((s,b)=>s+b.totalCollected,0),bookings:tm.filter(b=>['Confirmed','Advance Paid','Shoot Completed','Delivered','Closed'].includes(b.status)).length,leads:tm.length,profit:tm.reduce((s,b)=>s+b.platformMargin,0)-S.expenses.filter(e=>e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0)};
  const md=[{k:'revenue',l:'Monthly Revenue (₹)',m:true},{k:'bookings',l:'Bookings Target'},{k:'leads',l:'New Leads Target'},{k:'profit',l:'Net Profit (₹)',m:true}];

      ${tot===0?'<div class="empty">Set targets above to track progress! 🎯</div>':''}
    </div>`;
}

/* ═══ INVESTOR ═══ */
function rInvestor(){
  const tm=S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(thisMonth()));
  const lm=S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(lastMonth()));
  const gm=tm.reduce((s,b)=>s+b.quotedAmount,0),lg=lm.reduce((s,b)=>s+b.quotedAmount,0);
  const gg=lg?Math.round((gm-lg)/lg*100):null;
  const nr=tm.reduce((s,b)=>s+b.platformMargin,0);
  const np=nr-S.expenses.filter(e=>e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0);
  const tr2=tm.length?Math.round(tm.reduce((s,b)=>s+(b.quotedAmount?(b.platformFee+b.platformMargin)/b.quotedAmount*100:0),0)/tm.length*10)/10:0;

    <div style="max-width:880px;margin:0 auto">

        <div><h2 style="font-size:20px;font-weight:600;margin-bottom:2px">Investor Dashboard</h2><div style="font-size:12px;color:#888">S2DIO ERA · ${MONTHS[new Date().getMonth()]} ${new Date().getFullYear()}</div></div>

        ${[['GMV (MTD)',INRf(gm),gg!==null?`${gg>0?'+':''}${gg}% MoM`:'—','#378ADD'],['Take Rate',tr2+'%','Platform margin%','#8B5CF6'],['Net Revenue',INRf(nr),'Platform margin','#1D9E75'],['Net Profit',INRf(np),`${nr?Math.round(np/nr*100):0}% margin`,np>=0?'#10B981':'#EF4444'],['Active Vendors',S.vendors.filter(v=>v.active).length,S.vendors.filter(v=>v.tier==='Verified Pro').length+' Verified Pro','#F59E0B'],['Repeat %',rp+'%',ph.filter((p,i)=>ph.indexOf(p)<i).length+' repeat','#6366F1'],['Total Bookings',S.bookings.length,tm.length+' this month','#378ADD']].map(([l,v,s,c])=>`<div class="card" style="text-align:center"><div style="font-size:10px;color:#888;margin-bottom:5px">${l}</div><div style="font-size:20px;font-weight:700;color:${c}">${v}</div>${s?`<div style="font-size:10px;color:#888;margin-top:3px">${s}</div>`:''}</div>`).join('')}
      </div>
      <div class="card"><div style="font-size:12px;font-weight:500;color:#888;margin-bottom:8px">6-Month GMV & Net Revenue Trend</div><canvas id="ch-inv" height="200"></canvas></div>

function submitBooking(){
  const d=S.modalData;
  const item={
    id:d.id||uid(),
    bookingNo:gv('f-bno')||nextLeadNo(),
    status:gv('f-bst')||'New Inquiry',
    priority:gv('f-bpr')||'Medium',
    clientName:gv('f-bcn'),clientPhone:gv('f-bcp'),clientEmail:gv('f-bce'),
    service:gv('f-bsv'),city:gv('f-bcy'),source:gv('f-bsr'),
    vendorId:gv('f-bvd'),
    shootDate:gv('f-bsd'),deliveryDue:gv('f-bdd'),
    clientBudget:+gv('f-bbg')||0,quotedAmount:+gv('f-bqa')||0,
    vendorCost:+gv('f-bvc')||0,platformFee:+gv('f-bpf')||0,
    advancePaid:+gv('f-bap')||0,advanceVendor:d.advanceVendor||0,
    totalCollected:+gv('f-btc')||0,totalPaidVendor:d.totalPaidVendor||0,
    remarks:gv('f-brm'),
    comments:d.comments||[],deliverables:d.deliverables||[],
    review:d.review||null,quoteItems:d.quoteItems||[],
    followUps:d.followUps||[],googleReviewLink:d.googleReviewLink||'',
    advancePct:d.advancePct||30,
    createdAt:d.createdAt||today()
  };
  item.platformMargin=item.quotedAmount-item.vendorCost-item.platformFee;
  if(d.id)S.bookings=S.bookings.map(x=>x.id===d.id?item:x);
  else S.bookings.push(item);
  savB();
  atSync('Client Leads',d.id?'PATCH':'POST',null,{'Lead ID':item.bookingNo,'Client Name':item.clientName,'Phone':item.clientPhone,'Service':item.service,'City':item.city,'Status':item.status,'Quoted Amount':item.quotedAmount,'Priority':item.priority});
  closeModal();render();
}

  const d=S.modalData;

  if(d.id)S.ads=S.ads.map(x=>x.id===d.id?item:x);
  else S.ads.push(item);
  savA();closeModal();render();
}

function submitFU(){
  const bid=S.modalData.bookingId;
  const fu={id:uid(),date:gv('f-fud'),type:gv('f-fut'),purpose:gv('f-fup'),notes:gv('f-fun'),done:false};
  S.bookings=S.bookings.map(b=>b.id===bid?{...b,followUps:[...(b.followUps||[]),fu]}:b);
  savB();closeModal();if(S.lead)renderLeadDetail();else render();
}

function toggleVSvc(svc,el){
  const i=S.modalData._selSvcs.indexOf(svc);
  if(i>=0){S.modalData._selSvcs.splice(i,1);el.style.background='transparent';el.style.color='#666';}

/* ═══ ACTIONS ═══ */
function updBField(id,field,val){
  S.bookings=S.bookings.map(b=>b.id===id?{...b,[field]:val}:b);
  savB();
  if(S.lead===id)renderLeadDetail();
}
function updPayment(id,field,val){
  const b=gB(id);if(!b)return;
  const upd={[field]:val};
  if(field==='totalCollected'){if(val>=(b.quotedAmount||0)*0.99)upd.status='Shoot Completed';else if(val>0&&b.status==='Quote Sent')upd.status='Advance Paid';}
  S.bookings=S.bookings.map(x=>x.id===id?{...x,...upd}:x);
  addCommentToB(id,`${field} updated to ${INRf(val)}`,'payment');
  savB();renderLeadDetail();
}
function addCommentToB(id,text,type){
  const c={id:uid(),author:'Admin',text,ts:new Date().toISOString(),type:type||'note'};
  S.bookings=S.bookings.map(b=>b.id===id?{...b,comments:[...(b.comments||[]),c]}:b);
}
function addComment(bid){
  const inp=g('c-inp');if(!inp||!inp.value.trim())return;
  addCommentToB(bid,inp.value,'note');
  savB();inp.value='';renderLeadDetail();
}
function updQItem(bid,i,field,val){
  const b=gB(bid);if(!b)return;
  const qi=[...(b.quoteItems||[])];
  qi[i]={...qi[i],[field]:val};
  updBField(bid,'quoteItems',qi);
}
function addQItem(bid){
  const b=gB(bid);if(!b)return;
  updBField(bid,'quoteItems',[...(b.quoteItems||[]),{id:uid(),section:'Photography/Videography',desc:'',qty:1,rate:0}]);
  setTimeout(()=>renderLeadDetail(),50);
}
function rmQItem(bid,i){
  const b=gB(bid);if(!b)return;
  const qi=[...(b.quoteItems||[])];qi.splice(i,1);
  updBField(bid,'quoteItems',qi);setTimeout(()=>renderLeadDetail(),50);
}
function addDel(bid){
  const name=g('d-name')?.value,link=g('d-link')?.value,type=g('d-type')?.value||'Photos';
  if(!name||!link)return;
  const b=gB(bid);if(!b)return;
  updBField(bid,'deliverables',[...(b.deliverables||[]),{id:uid(),name,driveLink:link,type,uploadedAt:today()}]);
  setTimeout(()=>renderLeadDetail(),50);
}
function rmDel(bid,did){
  const b=gB(bid);if(!b)return;
  updBField(bid,'deliverables',(b.deliverables||[]).filter(d=>d.id!==did));
  setTimeout(()=>renderLeadDetail(),50);
}
function toggleFU(bid,fid){
  S.bookings=S.bookings.map(b=>b.id===bid?{...b,followUps:(b.followUps||[]).map(f=>f.id===fid?{...f,done:!f.done}:f)}:b);
  savB();if(S.lead)renderLeadDetail();else renderTab();
}
function delBooking(id){if(confirm('Delete this booking?')){S.bookings=S.bookings.filter(b=>b.id!==id);savB();renderTab();}}
function delVendor(id){if(confirm('Delete this vendor?')){S.vendors=S.vendors.filter(v=>v.id!==id);savV();renderTab();}}
function delExp(id){if(confirm('Delete?')){S.expenses=S.expenses.filter(e=>e.id!==id);savE();renderTab();}}
function delAd(id){if(confirm('Delete?')){S.ads=S.ads.filter(a=>a.id!==id);savA();renderTab();}}
function quickPay(bid){const a=prompt('Amount to pay:');if(a!==null){S.bookings=S.bookings.map(b=>b.id===bid?{...b,totalPaidVendor:(b.totalPaidVendor||0)+(+a||0)}:b);savB();renderTab();}}
function setTarget(key,val){const t=S.targets[thisMonth()]||{};t[key]=val;S.targets={...S.targets,[thisMonth()]:t};savT();}
function copyCreatorWA(vid){const v=gV(vid);if(!v)return;const msg=`Hi! Recommending *${v.name}* (${v.tier})\n📍 ${v.city} | ⭐ ${v.rating}\n💰 From ${INRf(v.baseRate)}\n🎯 ${(v.services||[]).join(', ')}\n\nInterested? I'll share the quote! 🎬\n_Team S2DIO ERA_`;navigator.clipboard.writeText(msg).then(()=>alert('Copied!'));}
function copyQWA(tot){const qB=S.bookings.find(b=>b.id===S.qBId);const t=`*QUOTATION — S2DIO ERA*\n📋 ${qB?.bookingNo||'NEW'}\n\nHi ${qB?.clientName||'Client'},\n\n${S.qItems.filter(i=>i.desc).map(i=>`• ${i.desc} (x${i.qty}) — ${INRf(i.qty*i.rate)}`).join('\n')}\n\n${S.qNotes?S.qNotes+'\n\n':''}💰 Total: ${INRf(tot)}${S.qGst?'\n(incl. 18% GST)':''}\n💳 Advance (30%): ${INRf(Math.round(tot*0.3))}\n\n_Team S2DIO ERA_\ns2dioera.com`;navigator.clipboard.writeText(t).then(()=>alert('Copied!'));}
function saveQToLead(tot){if(!S.qBId)return;updBField(S.qBId,'quoteItems',S.qItems);updBField(S.qBId,'quotedAmount',tot);updBField(S.qBId,'status','Quote Sent');alert('Saved to lead!');}
let selStars=3;

/* ═══ CHARTS ═══ */
const CC=['#378ADD','#1D9E75','#BA7517','#7F77DD','#D85A30','#E24B4A','#0F6E56','#533F2B','#B45309','#7C3AED'];
function mkChart(id,type,labels,datasets,opts){
  const el=g(id);if(!el)return;
  if(S.charts[id])S.charts[id].destroy();
  try{S.charts[id]=new Chart(el,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:opts?.legend||false}},scales:opts?.noScales?{}:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:opts?.pct?v=>v+'%':opts?.money?v=>v>999?'₹'+(v/1000).toFixed(0)+'K':'₹'+v:undefined}}}}});}catch(e){}}

function mData(){
  return [0,1,2,3,4,5].map(i=>{const ms=`2026-0${i+1}`;const mb=S.bookings.filter(b=>b.createdAt?.startsWith(ms));const mg=mb.reduce((s,b)=>s+b.platformMargin,0);const ex=S.expenses.filter(e=>e.date.startsWith(ms)).reduce((s,e)=>s+e.amount,0);return{month:MONTHS[i],gmv:mb.reduce((s,b)=>s+b.quotedAmount,0),margin:mg,netProfit:mg-ex,collected:mb.reduce((s,b)=>s+b.totalCollected,0),bookings:mb.length,expenses:ex};});
}

function renderCharts(){
  const md=mData();
  /* Dashboard */
  if(g('ch-dash'))mkChart('ch-dash','bar',md.map(d=>d.month),[{label:'GMV',data:md.map(d=>d.gmv),backgroundColor:'#378ADD55',borderColor:'#378ADD',borderWidth:2},{label:'Margin',data:md.map(d=>d.margin),backgroundColor:'#1D9E7555',borderColor:'#1D9E75',borderWidth:2},{label:'Expenses',data:md.map(d=>d.expenses),backgroundColor:'#E24B4A55',borderColor:'#E24B4A',borderWidth:2}],{legend:true,money:true});
  if(g('ch-pipe')){const pSt=BSTATUS.filter(s=>S.bookings.some(b=>b.status===s));mkChart('ch-pipe','doughnut',pSt,pSt.map(s=>({data:[S.bookings.filter(b=>b.status===s).length]})).length===0?[]:[ {data:pSt.map(s=>S.bookings.filter(b=>b.status===s).length),backgroundColor:pSt.map(s=>SC[s]||'#888')}],{noScales:true,legend:false});}
  /* P&L */
  if(g('ch-pnl'))mkChart('ch-pnl','bar',md.map(d=>d.month),[{label:'Margin',data:md.map(d=>d.margin),backgroundColor:'#1D9E7555',borderColor:'#1D9E75',borderWidth:2},{label:'Net Profit',data:md.map(d=>d.netProfit),backgroundColor:'#10B98155',borderColor:'#10B981',borderWidth:2}],{legend:true,money:true});
  if(g('ch-exp')){const cats=ECATS.filter(c=>S.expenses.some(e=>e.cat===c));mkChart('ch-exp','doughnut',cats,[{data:cats.map(c=>S.expenses.filter(e=>e.cat===c).reduce((s,e)=>s+e.amount,0)),backgroundColor:CC}],{noScales:true});}
  /* Ads */
  const src=SOURCES.filter(s=>S.bookings.some(b=>b.source===s));
  if(g('ch-src'))mkChart('ch-src','bar',src,[{data:src.map(s=>S.bookings.filter(b=>b.source===s).length),backgroundColor:CC}],{money:false});
  if(g('ch-sgmv'))mkChart('ch-sgmv','bar',src,[{data:src.map(s=>S.bookings.filter(b=>b.source===s).reduce((x,b)=>x+b.quotedAmount,0)),backgroundColor:'#10B98188'}],{money:true});
  /* Analytics */
  if(g('ch-svc')){const sd=SERVICES.filter(s=>S.bookings.some(b=>b.service===s));mkChart('ch-svc','bar',sd,[{data:sd.map(s=>S.bookings.filter(b=>b.service===s).reduce((x,b)=>x+b.quotedAmount,0)),backgroundColor:CC}],{money:true});}
  if(g('ch-funnel')){const fd=BSTATUS.filter(s=>S.bookings.some(b=>b.status===s));mkChart('ch-funnel','bar',fd,[{data:fd.map(s=>S.bookings.filter(b=>b.status===s).length),backgroundColor:fd.map(s=>SC[s]||'#888')}],{});}
  if(g('ch-repeat')){const ph=S.bookings.map(b=>b.clientPhone),rep=ph.filter((p,i)=>ph.indexOf(p)<i).length;mkChart('ch-repeat','doughnut',['New','Repeat'],[{data:[S.bookings.length-rep,rep],backgroundColor:['#378ADD','#10B981']}],{noScales:true});}
  /* Break-even */
  if(g('ch-be')){
    const tm=S.bookings.filter(b=>b.createdAt?.startsWith(thisMonth()));
    const fc=S.expenses.filter(e=>e.type==='fixed'&&e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0);
    const days=new Date().getDate();
    const labs=[],margins=[];
    for(let i=1;i<=days;i++){const d=`${thisMonth()}-${String(i).padStart(2,'0')}`;labs.push(i);margins.push(tm.filter(b=>b.createdAt<=d).reduce((s,b)=>s+b.platformMargin,0));}
    mkChart('ch-be','line',labs,[{label:'Cumul. Margin',data:margins,borderColor:'#10B981',backgroundColor:'#10B98122',fill:true},{label:'Break-even',data:Array(days).fill(fc),borderColor:'#EF4444',borderDash:[5,5]}],{legend:true,money:true});
  }
  /* Investor */
  if(g('ch-inv'))mkChart('ch-inv','line',md.map(d=>d.month),[{label:'GMV',data:md.map(d=>d.gmv),borderColor:'#378ADD',tension:0.4,fill:false},{label:'Net Revenue',data:md.map(d=>d.margin),borderColor:'#10B981',tension:0.4,fill:false},{label:'Net Profit',data:md.map(d=>d.netProfit),borderColor:'#1D9E75',tension:0.4,borderDash:[5,5],fill:false}],{legend:true,money:true});
}

  const el=document.getElementById('pj-preview-text');if(el)el.textContent=msg;

function pjCopy(){
  const msg=document.getElementById('pj-out')?.value||document.getElementById('pj-preview-text')?.textContent||'';
  if(!msg||msg.includes('Fill the form'))return alert('Fill the form fields first!');
  navigator.clipboard.writeText(msg).then(()=>alert('Copied! Paste in WhatsApp group 📱'));
}

/* ═══ INIT ═══ */
document.addEventListener('DOMContentLoaded',()=>{
  initData();
  render();
  // pj fields live update
  document.addEventListener('input', e=>{if(e.target?.id?.startsWith('pj-'))pjUpdate();});
});
