  get: async (key) => {

  },
  set: async (key, value) => {

                  <button onClick={()=>navigator.clipboard.writeText(d.driveLink)} style={{background:"#10B98122",color:"#10B981",border:"none",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}>📋</button>
                  <button onClick={()=>updB(b.id,{deliverables:(b.deliverables||[]).filter(x=>x.id!==d.id)})} style={{background:"none",border:"0.5px solid #fca5a5",borderRadius:5,padding:"3px 6px",cursor:"pointer",fontSize:11,color:"#EF4444"}}>✕</button>

  const WAModal=()=>waPreview&&(

        <div style={{background:"#25D366",color:"#fff",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:600,fontSize:14}}>📱 WhatsApp — {waPreview.stage}</div><button onClick={()=>setWaPreview(null)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer"}}>✕</button></div>
        <div style={{padding:14}}><div style={{background:"#DCF8C6",borderRadius:10,padding:12,fontSize:12.5,lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:320,overflowY:"auto",fontFamily:"inherit"}}>{waPreview.msg}</div><div style={{display:"flex",gap:8,marginTop:10}}><button onClick={()=>{navigator.clipboard.writeText(waPreview.msg);setWaPreview(null);}} style={{flex:1,background:"#25D366",color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontWeight:500,fontSize:13}}>📋 Copy</button><button onClick={()=>setWaPreview(null)} style={{flex:1,background:"#128C7E",color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontWeight:500,fontSize:13}}>Done</button></div></div>

  const gN=(c,p)=>p===0?null:Math.round(((c-p)/p)*100);

  const rDash=()=>{
    const dom=new Date().getDate(),dim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate(),pace=dom/dim;
    const tgt=targets[thisMonth]||{};

    const wC={leads:twB.length,rev:twB.reduce((s,b)=>s+b.totalCollected,0),deals:twB.filter(b=>["Confirmed","Advance Paid","Closed","Delivered"].includes(b.status)).length};
    const wP={leads:lwB.length,rev:lwB.reduce((s,b)=>s+b.totalCollected,0),deals:lwB.filter(b=>["Confirmed","Advance Paid","Closed","Delivered"].includes(b.status)).length};

        <div style={{background:"var(--color-background-secondary)",borderRadius:10,padding:"10px 14px",marginBottom:8,border:"0.5px solid var(--color-border-secondary)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",marginBottom:7}}>📉 NEEDLE — WEEK OVER WEEK</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {[["Leads",wC.leads,wP.leads,false],["Revenue",wC.rev,wP.rev,false],["Deals",wC.deals,wP.deals,false]].map(([lbl,c,p,inv])=>{const pct=gN(c,p);const good=pct===null?null:(inv?pct<0:pct>0);return <div key={lbl} style={{flex:1,minWidth:90,textAlign:"center"}}><div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{lbl}</div><div style={{fontSize:15,fontWeight:700,color:pct===null?"var(--color-text-primary)":good?"#10B981":"#EF4444"}}>{pct===null?"—":`${pct>0?"+":""}${pct}%`}</div><div style={{fontSize:10,color:"var(--color-text-secondary)"}}>{typeof c==="number"&&c>1000?INRf(c):c} vs {typeof p==="number"&&p>1000?INRf(p):p}</div></div>;})}
          </div>
        </div>
        {tgt.revenue&&<div style={{background:"var(--color-background-secondary)",borderRadius:10,padding:"10px 14px",marginBottom:8,border:"0.5px solid var(--color-border-secondary)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",marginBottom:7}}>🚩 TARGETS — {MONTHS[new Date().getMonth()]}</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {[["Revenue",ach.revenue,+tgt.revenue||1],["Bookings",ach.bookings,+tgt.bookings||1],["Leads",ach.leads,+tgt.leads||1]].map(([lbl,ac,t])=>{const pct=Math.min(100,Math.round(ac/t*100));const bc=pct>=80?"#10B981":pct>=50?"#F59E0B":"#EF4444";return <div key={lbl} style={{flex:1,minWidth:110}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:"var(--color-text-secondary)"}}>{lbl}</span><span style={{fontWeight:700,color:bc}}>{pct}%</span></div><PBar pct={pct} color={bc}/><div style={{fontSize:10,color:pct>=Math.round(pace*100)?"#10B981":"#EF4444",marginTop:2}}>{pct>=Math.round(pace*100)?"✅ On track":"⚠ Behind"}</div></div>;})}
          </div>
        </div>}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}><KCard label="GMV Pipeline" value={INRf(pipeVal)} accent="#378ADD"/><KCard label="Platform Margin" value={INRf(totalGP)} accent="#10B981"/><KCard label="Net Profit" value={INRf(netProfit)} accent={netProfit>=0?"#10B981":"#EF4444"}/><KCard label="Pending Collections" value={INRf(pendCP)} accent="#F97316"/><KCard label="Pending Payouts" value={INRf(pendVP)} accent="#8B5CF6"/></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}><KCard label="Total Leads" value={bookings.length} sub={`${bookings.filter(b=>["Confirmed","Advance Paid","Shoot Completed","Delivered","Closed"].includes(b.status)).length} converted`}/><KCard label="Active Vendors" value={vendors.filter(v=>v.active).length}/><KCard label="Overdue FUs" value={dueFU.length} accent={dueFU.length>0?"#EF4444":"#10B981"} onClick={()=>setTab("followups")}/><KCard label="Avg Deal" value={INRf(bookings.length?bookings.reduce((s,b)=>s+b.quotedAmount,0)/bookings.length:0)}/><KCard label="Avg Margin %" value={`${bookings.length?(bookings.reduce((s,b)=>s+(b.quotedAmount?b.platformMargin/b.quotedAmount*100:0),0)/bookings.length).toFixed(1):0}%`} accent="#1D9E75"/></div>

          </tr>

  const rLeads=()=>{
    const sorted=[...filtBk].sort((a,b)=>{const po={"Urgent":0,"High":1,"Medium":2,"Low":3};return(po[a.priority]||2)-(po[b.priority]||2)||b.createdAt?.localeCompare(a.createdAt);});
    return(
      <div>
        <SHead title="Lead Pipeline" action={<div style={{display:"flex",gap:7}}><input value={bSearch} onChange={e=>setBSearch(e.target.value)} placeholder="Search name/ID/phone..." style={{padding:"6px 10px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",fontSize:13,width:210}}/><button onClick={()=>resetBF()} style={{background:"#378ADD",color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:500}}>+ New Lead</button></div>}/>

  const rBreakeven=()=>{
    const fc=expenses.filter(e=>e.type==="fixed"&&e.date.startsWith(thisMonth)).reduce((s,e)=>s+e.amount,0);
    const cl=tmB.filter(b=>["Confirmed","Advance Paid","Shoot Completed","Delivered","Closed"].includes(b.status));
    const am=cl.length?cl.reduce((s,b)=>s+b.platformMargin,0)/cl.length:0;
    const ap=cl.length?cl.reduce((s,b)=>s+(b.quotedAmount?b.platformMargin/b.quotedAmount*100:0),0)/cl.length:0;
    const beB=fc&&am?Math.ceil(fc/am):0,beR=fc&&ap?Math.ceil(fc/(ap/100)):0;
    const cur=cl.length,rem=Math.max(0,beB-cur),pct=beB?Math.min(100,Math.round(cur/beB*100)):0;
    const days=new Date().getDate();

    </div>;

  const rCreators=()=>{
    const flt=vendors.filter(v=>{if(!v.active)return false;if(cf.city&&!v.city?.toLowerCase().includes(cf.city.toLowerCase()))return false;if(cf.service&&!v.services?.includes(cf.service))return false;if(cf.maxPrice&&v.baseRate>+cf.maxPrice)return false;return true;}).sort((a,b)=>{const to={"Verified Pro":0,"Verified":1,"New Partner":2};return(to[a.tier]||2)-(to[b.tier]||2)||(b.rating||0)-(a.rating||0);});

    return <div><SHead title="🔍 Find Creator"/>

          <FRow label="Service"><FSel value={cf.service} onChange={v=>setCf({...cf,service:v})} opts={SERVICES}/></FRow>
          <FRow label="Max Price (₹)"><FInp type="number" value={cf.maxPrice} onChange={v=>setCf({...cf,maxPrice:v})} placeholder="Max base rate"/></FRow>
          <FRow label="Shoot Date"><FInp type="date" value={cf.date} onChange={v=>setCf({...cf,date:v})}/></FRow>
        </div>
        {flt.length>0&&<button onClick={()=>navigator.clipboard.writeText(wt).then(()=>alert("Copied!"))} style={{background:"#25D366",color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:500}}>📱 Copy Top 3 Options (WhatsApp)</button>}
      </div>
      <div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:8}}>{flt.length} creator{flt.length!==1?"s":""} found</div>

          <div key={v.id} style={{background:"var(--color-background-secondary)",borderRadius:10,padding:12,border:"0.5px solid var(--color-border-tertiary)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}><div><div style={{fontWeight:500,fontSize:13}}>{v.name}</div><div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{v.cat}</div></div><Badge label={v.tier} color={v.tier==="Verified Pro"?"#10B981":v.tier==="Verified"?"#378ADD":"#F59E0B"}/></div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:7}}>{(v.services||[]).slice(0,4).map(s=><Chip key={s} label={s}/>)}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,fontSize:11,marginBottom:7}}><div><span style={{color:"var(--color-text-secondary)"}}>City: </span>{v.city}</div><div>⭐ {v.rating} ({v.reviews})</div><div><span style={{color:"var(--color-text-secondary)"}}>Base: </span><strong style={{color:"#10B981"}}>{INRf(v.baseRate)}</strong></div><div>{INRf(v.perHour)}/hr</div></div>
            <div style={{display:"flex",gap:5}}><button onClick={()=>{const msg=`Hi! Recommending *${v.name}* (${v.tier})\n📍 ${v.city} | ⭐ ${v.rating}\n💰 From ${INRf(v.baseRate)}\n🎯 ${v.services?.join(", ")||""}\n\nInterested? I'll share the quote! 🎬\n_Team S2DIO ERA_`;navigator.clipboard.writeText(msg).then(()=>alert("Copied!"));}} style={{flex:1,background:"#25D366",color:"#fff",border:"none",borderRadius:5,padding:"5px",cursor:"pointer",fontSize:11,fontWeight:500}}>📱 WA</button><button onClick={()=>resetVF(v)} style={{flex:1,background:"none",border:"0.5px solid var(--color-border-secondary)",borderRadius:5,padding:"5px",cursor:"pointer",fontSize:11}}>✏ Edit</button></div>
          </div>
        ))}
        {flt.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:36,color:"var(--color-text-secondary)"}}>No creators match. Try adjusting filters!</div>}
      </div>

  const rHelp=()=>{
    const secs=[{t:"📋 New Lead Flow",b:`1. Go to "Leads" tab → click "+ New Lead"\n2. Fill: Client Name, Phone, Service, City, Source, Priority\n3. Save → Lead auto-numbered: S2E-YYYY-MM-XXX\n4. Click "Open Lead" to view full pipeline with all stages`},{t:"👨‍📷 Assigning a Creator",b:`1. Use "Find Creator" tab → filter by city + service + price\n2. Copy WhatsApp message to send 3 creator options to client\n3. Open lead → click pipeline stage "Vendor Matched"\n4. Edit booking to formally assign the vendor`},{t:"📄 Sending a Quotation",b:`1. Open Lead → "Quotation" tab → add line items\n2. Or use "Quotation" tab for standalone quotation builder\n3. Click "Copy WhatsApp Quote" → paste directly in WhatsApp\n4. Lead status auto-moves to "Quote Sent"`},{t:"💰 Recording Payments",b:`1. Open Lead → "Payments" tab\n2. Update "Advance from Client" when advance received\n3. Update "Total Collected" when final payment done\n4. Status auto-updates and a note is added to timeline automatically`},{t:"📁 Uploading Deliverables",b:`1. Upload content to Google Drive\n2. Open Lead → "Deliverables" tab → paste Drive link\n3. Click "Send Delivery WhatsApp" for branded message with links\n4. Save Google Review link and request review from client`},{t:"⭐ Review Management",b:`1. Open Lead → "Review" tab\n2. Mark review received with rating, text, and platform\n3. Track review rate across all bookings\n4. Request reviews within 48 hrs of delivery for best response rate`},{t:"📅 Daily Checklist",b:`□ Check "Follow-ups" tab for overdue items\n□ Update lead statuses in "Leads" tab\n□ Log expenses same day in P&L tab\n□ Check "Targets" tab — are you on pace?\n□ Check "Break-even" tab — bookings still needed?\n□ Review new inquiries and create leads immediately`}];

            {helpOpen===i&&<div style={{padding:"0 14px 12px",whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.9,color:"var(--color-text-secondary)"}}>{s.b}</div>}
          </div>
        ))}

        <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:3}}>Base ID: <code style={{background:"var(--color-background-primary)",padding:"1px 5px",borderRadius:3,fontSize:10}}>{AT_BASE}</code>{atStatus!=="idle"&&<span style={{marginLeft:7,color:atStatus==="ok"?"#10B981":atStatus==="error"?"#EF4444":"#F59E0B"}}>{atStatus==="syncing"?"⟳ Syncing":atStatus==="ok"?"✓ Synced":"✕ Error"}</span>}</div>
        <div style={{marginTop:8,fontSize:11,color:"var(--color-text-secondary)"}}>Required Airtable table: <strong>Client Leads</strong> with fields: Lead ID, Client Name, Phone, Service, City, Status, Priority, Quoted Amount, Total Collected, Remarks</div>
      </div>
    </div>;
  };

          {bForm.quotedAmount&&<div style={{fontSize:11,color:"#10B981",marginTop:3}}>Est. Margin: {INRf((+bForm.quotedAmount||0)-(+bForm.vendorCost||0)-(+bForm.platformFee||0))}</div>}
        </div>
        <FRow label="Remarks"><textarea value={bForm.remarks||""} onChange={e=>setBForm({...bForm,remarks:e.target.value})} rows={2} style={{width:"100%",boxSizing:"border-box",padding:"6px 10px",borderRadius:6,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",fontSize:13,resize:"vertical"}}/></FRow>
        <div style={{display:"flex",gap:7,marginTop:3}}><button onClick={submitB} style={{background:"#378ADD",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:500}}>Save Lead</button><button onClick={()=>{setBookingModal(false);setEditId(null);}} style={{background:"none",border:"0.5px solid var(--color-border-secondary)",borderRadius:8,padding:"8px 14px",cursor:"pointer"}}>Cancel</button></div>
      </Modal>
    );
  };

  const FUMod=({bid})=>{const b=gB(bid);return <Modal title={`Follow-ups — ${b?.bookingNo} (${b?.clientName})`} onClose={()=>setFuModal(null)}><div style={{marginBottom:12}}>{(b?.followUps||[]).length===0&&<div style={{color:"var(--color-text-secondary)",fontSize:13,padding:"7px 0"}}>No follow-ups yet.</div>}{(b?.followUps||[]).map(f=><div key={f.id} style={{display:"flex",gap:7,alignItems:"flex-start",padding:"7px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}><Toggle checked={f.done} onChange={()=>markFUDone(bid,f.id)}/><div style={{flex:1}}><div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:1}}><Badge label={f.type} color="#378ADD"/><Badge label={f.purpose} color="#8B5CF6"/><span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{f.date}</span>{f.done&&<Badge label="Done" color="#10B981"/>}</div>{f.notes&&<div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{f.notes}</div>}</div></div>)}</div><div style={{background:"var(--color-background-secondary)",borderRadius:8,padding:10}}><div style={{fontSize:12,fontWeight:500,marginBottom:7}}>Add Follow-up</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}><FRow label="Date"><FInp type="date" value={fuForm.date} onChange={v=>setFuForm({...fuForm,date:v})}/></FRow><FRow label="Type"><FSel value={fuForm.type} onChange={v=>setFuForm({...fuForm,type:v})} opts={FU_TYPES}/></FRow><FRow label="Purpose"><FSel value={fuForm.purpose} onChange={v=>setFuForm({...fuForm,purpose:v})} opts={FU_PURPOSES}/></FRow></div><FRow label="Notes"><FInp value={fuForm.notes} onChange={v=>setFuForm({...fuForm,notes:v})} placeholder="Action notes"/></FRow><button onClick={()=>addFU(bid)} style={{background:"#10B981",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:500,marginTop:3}}>Add</button></div></Modal>;};

  return(
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"var(--color-background-primary)",color:"var(--color-text-primary)",minHeight:"100vh"}}>
      {leadView&&<LeadDetail/>}
      <WAModal/>
      <div style={{background:"#111",color:"#fff",padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:500}}>
        <div style={{fontWeight:600,fontSize:14}}>S2DIO ERA — CRM v2.0</div>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:11}}>
          {atStatus!=="idle"&&<span style={{color:atStatus==="ok"?"#10B981":atStatus==="error"?"#EF4444":"#F59E0B"}}>{atStatus==="syncing"?"⟳ Syncing":atStatus==="ok"?"✓ Synced":"✕ Sync Error"}</span>}
          <span style={{color:"#555"}}>s2dioera.com</span>
        </div>
      </div>
      <div style={{borderBottom:"0.5px solid var(--color-border-secondary)",overflowX:"auto",display:"flex",background:"var(--color-background-primary)",position:"sticky",top:38,zIndex:499}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"9px 12px",fontSize:11,fontWeight:500,cursor:"pointer",border:"none",background:"none",color:tab===t.id?"#378ADD":"var(--color-text-secondary)",borderBottom:tab===t.id?"2px solid #378ADD":"2px solid transparent",marginBottom:-1,whiteSpace:"nowrap",fontFamily:"inherit",position:"relative"}}>
            {t.label}
            {t.id==="followups"&&dueFU.length>0&&<span style={{background:"#EF4444",color:"#fff",fontSize:8,fontWeight:700,borderRadius:8,padding:"1px 4px",marginLeft:2,position:"absolute",top:5,right:3}}>{dueFU.length}</span>}
          </button>
        ))}
      </div>
      <div style={{padding:"18px",maxWidth:"100%",overflowX:"hidden"}}>
        {tab==="dashboard"&&rDash()}
        {tab==="leads"&&rLeads()}
        {tab==="bookings"&&rBookings()}
        {tab==="vendors"&&rVendors()}
        {tab==="payouts"&&rPayouts()}
        {tab==="profit"&&rPnL()}
        {tab==="ads"&&rAds()}
        {tab==="followups"&&rFU()}
        {tab==="analytics"&&rAnalytics()}
        {tab==="breakeven"&&rBreakeven()}
        {tab==="needle"&&rNeedle()}
        {tab==="targets"&&rTargets()}
        {tab==="bizhealth"&&rBizHealth()}
        {tab==="quotation"&&rQuotation()}
        {tab==="investor"&&rInvestor()}
        {tab==="creators"&&rCreators()}
        {tab==="help"&&rHelp()}
      </div>
      {vendorModal&&<VMod/>}
      {bookingModal&&<BMod/>}
      {fuModal&&<FUMod bid={fuModal}/>}
      {expModal&&<Modal title={editId?"Edit Expense":"New Expense"} onClose={()=>{setExpModal(false);setEditId(null);}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}><FRow label="Date"><FInp type="date" value={eForm.date} onChange={v=>setEForm({...eForm,date:v})}/></FRow><FRow label="Category"><FSel value={eForm.cat} onChange={v=>setEForm({...eForm,cat:v})} opts={ECATS}/></FRow><FRow label="Type"><FSel value={eForm.type} onChange={v=>setEForm({...eForm,type:v})} opts={["fixed","variable"]}/></FRow><FRow label="Amount (₹)"><FInp type="number" value={eForm.amount} onChange={v=>setEForm({...eForm,amount:v})}/></FRow><FRow label="Description"><FInp value={eForm.desc} onChange={v=>setEForm({...eForm,desc:v})}/></FRow><FRow label="Recurring"><div style={{display:"flex",alignItems:"center",gap:7,height:36}}><Toggle checked={!!eForm.rec} onChange={v=>setEForm({...eForm,rec:v})}/><span style={{fontSize:13}}>Monthly</span></div></FRow></div><div style={{display:"flex",gap:7,marginTop:3}}><button onClick={submitE} style={{background:"#EF4444",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:500}}>Save</button><button onClick={()=>{setExpModal(false);setEditId(null);}} style={{background:"none",border:"0.5px solid var(--color-border-secondary)",borderRadius:8,padding:"8px 14px",cursor:"pointer"}}>Cancel</button></div></Modal>}
      {adModal&&<Modal title={editId?"Edit Campaign":"New Campaign"} onClose={()=>{setAdModal(false);setEditId(null);}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}><FRow label="Platform"><FSel value={aForm.platform} onChange={v=>setAForm({...aForm,platform:v})} opts={["Instagram","Facebook","Google","YouTube","Other"]}/></FRow><FRow label="Campaign Name"><FInp value={aForm.campaign} onChange={v=>setAForm({...aForm,campaign:v})}/></FRow><FRow label="Start Date"><FInp type="date" value={aForm.start} onChange={v=>setAForm({...aForm,start:v})}/></FRow><FRow label="End Date"><FInp type="date" value={aForm.end} onChange={v=>setAForm({...aForm,end:v})}/></FRow><FRow label="Budget (₹)"><FInp type="number" value={aForm.budget} onChange={v=>setAForm({...aForm,budget:v})}/></FRow><FRow label="Spent (₹)"><FInp type="number" value={aForm.spent} onChange={v=>setAForm({...aForm,spent:v})}/></FRow><FRow label="Reach"><FInp type="number" value={aForm.reach} onChange={v=>setAForm({...aForm,reach:v})}/></FRow><FRow label="Leads"><FInp type="number" value={aForm.leads} onChange={v=>setAForm({...aForm,leads:v})}/></FRow><FRow label="Conversions"><FInp type="number" value={aForm.conv} onChange={v=>setAForm({...aForm,conv:v})}/></FRow></div><div style={{display:"flex",gap:7,marginTop:3}}><button onClick={submitA} style={{background:"#8B5CF6",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:500}}>Save</button><button onClick={()=>{setAdModal(false);setEditId(null);}} style={{background:"none",border:"0.5px solid var(--color-border-secondary)",borderRadius:8,padding:"8px 14px",cursor:"pointer"}}>Cancel</button></div></Modal>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
