.tab-btn.active{color:#378ADD;border-bottom-color:#378ADD}

.content{padding:12px 16px;max-width:100%;overflow-x:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-head h2{font-size:16px;font-weight:500}
.kpi-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.kcard{background:#fff;border-radius:8px;padding:10px 13px;flex:1;min-width:120px;border:1px solid #e5e7eb}
.kcard .lbl{font-size:10px;color:#888;margin-bottom:3px}
.kcard .val{font-size:17px;font-weight:600}
.kcard .sub{font-size:10px;color:#888;margin-top:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.card{background:#fff;border-radius:10px;padding:14px;border:1px solid #e5e7eb}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.btn-primary{background:#378ADD;color:#fff}
.btn-success{background:#10B981;color:#fff}
.btn-danger{background:#EF4444;color:#fff}
.btn-wa{background:#25D366;color:#fff}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-ghost{background:none;border:1px solid #e5e7eb}
input,select,textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #e5e7eb;font-size:13px;font-family:inherit;background:#fff;color:#111}
textarea{resize:vertical}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;white-space:nowrap}
.chip{display:inline-block;background:#f5f5f5;color:#666;font-size:11px;padding:2px 7px;border-radius:12px;margin-right:3px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:5px 7px;font-weight:500;color:#888;font-size:11px;border-bottom:1px solid #e5e7eb}
td{padding:6px 7px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#fafafa}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-wide{max-width:860px}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e5e7eb}
.modal-head h3{font-size:15px;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#888}
.modal-body{padding:20px;max-height:78vh;overflow-y:auto}
.lead-detail{position:fixed;inset:0;background:#fff;z-index:2000;overflow-y:auto}
.ld-topbar{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid #e5e7eb;background:#fff;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.pipeline-bar{padding:12px 16px;border-bottom:1px solid #e5e7eb;overflow-x:auto}
.pipeline-stages{display:flex;align-items:center;min-width:560px;margin-bottom:10px}
.ps-item{display:flex;flex-direction:column;align-items:center;flex:1;cursor:pointer}
.ps-dot{width:24px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.ps-label{font-size:9px;margin-top:2px;text-align:center;max-width:68px}
.ps-line{flex:1;height:2px;margin:0 3px;margin-bottom:16px}
.ld-stats{display:flex;gap:8px;padding:8px 16px;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;background:#f9fafb}
.stat-chip{background:#fff;border-radius:7px;padding:5px 10px;font-size:11px;border:1px solid #e5e7eb}
.stat-chip .sl{color:#888}
.stat-chip .sv{font-weight:600}

.ld-body{padding:16px}
.wa-preview{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;display:flex;align-items:center;justify-content:center;padding:16px}
.wa-box{background:#fff;border-radius:14px;max-width:440px;width:100%;overflow:hidden}

.pbar-wrap{background:#e5e7eb;border-radius:8px;height:8px;overflow:hidden}
.pbar-fill{height:100%;border-radius:8px;transition:width 0.4s}
.toggle{display:inline-flex;width:36px;height:20px;border-radius:10px;cursor:pointer;align-items:center;padding:0 3px;transition:background .2s;flex-shrink:0;border:none}

.hidden{display:none!important}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function INRf(v){return '₹'+(Number(v)||0).toLocaleString('en-IN')}
function today(){return new Date().toISOString().split('T')[0]}
function dfn(d){if(!d)return null;return Math.round((new Date(d)-new Date())/86400000)}
function thisMonth(){return new Date().toISOString().slice(0,7)}
function lastMonth(){const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7)}
function thisWkStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split('T')[0]}
function lastWkStart(){const d=new Date();d.setDate(d.getDate()-d.getDay()-7);return d.toISOString().split('T')[0]}
function lastWkEnd(){const d=new Date();d.setDate(d.getDate()-d.getDay()-1);return d.toISOString().split('T')[0]}

function gB(id){return S.bookings.find(b=>b.id===id)||null}

function load(k,def){try{const v=localStorage.getItem('s2e_'+k);return v?JSON.parse(v):def;}catch(e){return def;}}
function pct(a,b){return b?Math.min(100,Math.round(a/b*100)):0}
function needle(c,p){return p===0?null:Math.round(((c-p)/p)*100)}
function badge(lbl,color){return `<span class="badge" style="background:${color}22;color:${color}">${lbl}</span>`}
function chip(lbl){return `<span class="chip">${lbl}</span>`}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function atSync(table,method,rid,fields){
  if(!S.atToken)return;
  setAtStatus('syncing');
  try{
    const url=`https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}${rid?'/'+rid:''}`;
    const r=await fetch(url,{method,headers:{'Authorization':'Bearer '+S.atToken,'Content-Type':'application/json'},body:JSON.stringify({fields})});
    const d=await r.json();
    setAtStatus(d.error?'error':'ok');

}

/* ═══ BREAK-EVEN ═══ */
function rBreakeven(){
  const tm=S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(thisMonth()));
  const fc=S.expenses.filter(e=>e.type==='fixed'&&e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0);
  const cl=tm.filter(b=>['Confirmed','Advance Paid','Shoot Completed','Delivered','Closed'].includes(b.status));
  const am=cl.length?cl.reduce((s,b)=>s+b.platformMargin,0)/cl.length:0;
  const beB=fc&&am?Math.ceil(fc/am):0;
  const cur=cl.length,rem=Math.max(0,beB-cur),p=beB?pct(cur,beB):0;
  return `
    <div class="section-head"><h2>🎯 Break-even Analysis</h2></div>
    <div class="kpi-row" style="margin-bottom:14px">
      <div class="kcard"><div class="lbl">Fixed Costs MTD</div><div class="val" style="color:#EF4444">${INRf(fc)}</div></div>
      <div class="kcard"><div class="lbl">Avg Margin/Booking</div><div class="val" style="color:#10B981">${INRf(am)}</div></div>
      <div class="kcard"><div class="lbl">Break-even Bookings</div><div class="val" style="color:#F59E0B">${beB}</div></div>
      <div class="kcard"><div class="lbl">Bookings Closed</div><div class="val" style="color:#378ADD">${cur}</div></div>
      <div class="kcard"><div class="lbl">Still Needed</div><div class="val" style="color:${rem===0?'#10B981':'#EF4444'}">${rem}${rem===0?' ✅':''}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px"><span>Break-even Progress</span><span style="font-weight:700;color:${p>=100?'#10B981':'#F59E0B'}">${p}%${p>=100?' ✅':''}</span></div>
      ${pbar(p,p>=100?'#10B981':p>=50?'#F59E0B':'#EF4444',14)}
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:5px"><span>${cur} done</span><span>Target: ${beB}</span></div>
    </div>
    <div class="card"><div style="font-size:12px;font-weight:500;color:#888;margin-bottom:8px">Cumulative Margin vs Fixed Cost (MTD)</div><div style="position:relative;height:200px;width:100%"><canvas id="ch-be"></canvas></div></div>`;
}

/* ═══ NEEDLE ═══ */
function rNeedle(){
  const iw=S.needle==='week';
  const cur=iw?S.bookings.filter(b=>b.createdAt&&b.createdAt>=thisWkStart()):S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(thisMonth()));
  const prev=iw?S.bookings.filter(b=>b.createdAt&&b.createdAt>=lastWkStart()&&b.createdAt<=lastWkEnd()):S.bookings.filter(b=>b.createdAt&&b.createdAt.startsWith(lastMonth()));
  const ms=[
    {l:'New Leads',c:cur.length,p:prev.length,inv:false,f:v=>v},
    {l:'Confirmed Bookings',c:cur.filter(b=>['Confirmed','Advance Paid','Delivered','Closed'].includes(b.status)).length,p:prev.filter(b=>['Confirmed','Advance Paid','Delivered','Closed'].includes(b.status)).length,inv:false,f:v=>v},
    {l:'Revenue Collected',c:cur.reduce((s,b)=>s+b.totalCollected,0),p:prev.reduce((s,b)=>s+b.totalCollected,0),inv:false,f:INRf},
    {l:'Avg Deal Size',c:cur.length?Math.round(cur.reduce((s,b)=>s+b.quotedAmount,0)/cur.length):0,p:prev.length?Math.round(prev.reduce((s,b)=>s+b.quotedAmount,0)/prev.length):0,inv:false,f:INRf},
    {l:'Total Expenses',c:S.expenses.filter(e=>iw?e.date>=thisWkStart():e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0),p:S.expenses.filter(e=>iw?(e.date>=lastWkStart()&&e.date<=lastWkEnd()):e.date.startsWith(lastMonth())).reduce((s,e)=>s+e.amount,0),inv:true,f:INRf},
    {l:'Platform Margin',c:cur.reduce((s,b)=>s+b.platformMargin,0),p:prev.reduce((s,b)=>s+b.platformMargin,0),inv:false,f:INRf},
  ];
  return `
    <div class="section-head"><h2>📉 Needle Movement</h2>
      <div style="display:flex;gap:3px;background:#f5f5f5;border-radius:8px;padding:3px">

      </div>
    </div>

    </div>`;
}

/* ═══ TARGETS ═══ */
function rTargets(){
  const tgt=S.targets[thisMonth()]||{};

      ${tot===0?'<div class="empty">Set targets above to track progress! 🎯</div>':''}
    </div>`;

/* ═══ CSV IMPORT ═══ */
function importCSVVendors(){
  var existing=new Set(S.vendors.map(function(v){return (v.phone||'').replace(/\D/g,'');}));
  var added=0;
  var all=CSV_CREATORS.concat(CSV_STUDIOS);
  all.forEach(function(r){
    var ph=(r.phone||'').replace(/\D/g,'');
    if(!ph||existing.has(ph)){return;}
    existing.add(ph);
    var services=r.cat==='Studio'?['Studio Rental']:
      r.cat==='Photographer'?['Photography']:
      r.cat==='Videographer'?['Videography']:
      r.cat==='Cinematographer'?['Cinematography']:
      r.cat==='Drone Operator'?['Drone']:['Photography'];
    S.vendors.push({
      id:uid(),name:r.name,cat:r.cat,phone:r.phone,email:r.email,
      city:(r.city&&r.city!=='nan')?r.city:'',
      area:(r.area&&r.area!=='nan')?r.area:'',
      tier:r.tier,baseRate:r.baseRate||0,perHour:r.perHour||0,
      perDay:r.perDay||0,rating:r.rating||0,reviews:r.reviews||0,
      notes:r.ownerName?'Owner: '+r.ownerName:'',
      services:services,active:r.active,source:r.source
    });
    added++;
  });
  savV();
  alert(added+' new vendors imported! ('+S.vendors.length+' total)');
  render();
}

/* ═══ NEARBY VENDORS SIDEBAR ═══ */
function nearbyVendorsSidebar(b){
  if(!b||b.status!=='Enquiry Raised')return '';
  var city=(b.city||'').toLowerCase().trim();
  var cityAliases={
    'new delhi':['new delhi','delhi','ncr','delhi ncr'],
    'delhi ncr':['new delhi','delhi','ncr','delhi ncr'],
    'delhi':['new delhi','delhi','ncr','delhi ncr'],
    'noida':['noida'],
    'gurugram':['gurugram','gurgaon'],
    'gurgaon':['gurugram','gurgaon'],
    'faridabad':['faridabad'],
    'ghaziabad':['ghaziabad'],
    'mumbai':['mumbai'],
    'bengaluru':['bengaluru','bangalore'],
    'bangalore':['bengaluru','bangalore'],
  };
  var aliases=cityAliases[city]||[city];
  var pool=S.vendors.concat(CSV_CREATORS).concat(CSV_STUDIOS);
  var nearby=pool.filter(function(v){
    if(!v.name)return false;
    var vc=(v.city||'').toLowerCase().trim();
    return aliases.some(function(a){return vc===a||vc.indexOf(a)>=0||a.indexOf(vc)>=0;});
  });
  var seen=new Set();var uniq=[];
  nearby.forEach(function(v){
    var k=(v.phone||v.name||'').replace(/\D/g,'');
    if(k&&seen.has(k))return;
    if(k)seen.add(k);
    uniq.push(v);
  });
  if(uniq.length===0){
    return '<div style="font-size:12px;color:#888;text-align:center;padding:20px">No vendors found in <strong>'+esc(b.city)+'</strong></div>';
  }
  return uniq.slice(0,15).map(function(v){
    var src=v.source==='csv_studio'?'🏠 Studio':v.source==='csv_creator'?'📋 DB':'🏢 CRM';
    var waMsg='Hi '+v.name+'! 👋\n\nWe have a shoot requirement in *'+esc(b.city)+'*:\n📸 Service: '+esc(b.service||'Photography')+'\n📅 Date: '+(b.shootDate||'TBD')+'\n💰 Budget: '+INRf(b.clientBudget||0)+'\n\nAre you available? Please confirm with your rate. 🙏\n\nTeam S2DIO ERA';
    var ph=(v.phone||'').replace(/[^0-9+]/g,'');
    var html='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:9px;margin-bottom:6px">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">';
    html+='<div style="font-size:12px;font-weight:600">'+esc(v.name)+'</div>';
    html+='<span style="font-size:9px;background:#f3f4f6;padding:1px 5px;border-radius:4px;color:#666">'+src+'</span></div>';
    html+='<div style="font-size:11px;color:#888;margin-bottom:5px">'+esc(v.cat||'Photographer')+' · '+esc(v.area||v.city||'')+(v.baseRate>0?' · '+INRf(v.baseRate):'')+'</div>';
    html+='<div style="display:flex;gap:5px;flex-wrap:wrap">';
    if(ph) html+='<a href="tel:'+ph+'" class="btn btn-sm btn-ghost" style="font-size:10px;text-decoration:none;flex:1;text-align:center">📞 Call</a>';
    if(ph){
      var mid=btoa(encodeURIComponent(waMsg));
      html+='<button class="btn btn-sm btn-wa" style="font-size:10px;flex:1" onclick="copyVendorWA(\''+ph+'\',\''+mid+'\')">📋 WA Copy</button>';
    }
    html+='</div></div>';
    return html;
  }).join('');
}
function copyVendorWA(phone,msgb64){
  try{
    var msg=decodeURIComponent(atob(msgb64));
    navigator.clipboard.writeText(msg).then(function(){alert('Message copied! Open WhatsApp and paste for '+phone);});
  }catch(e){alert('Copy failed');}
}
function injectNearbySidebar(b){
  var sidebar=document.getElementById('nearby-sidebar');

function toggleTabVis(id,btn){
  var on=btn.dataset.on==='1';
  btn.style.background=on?'#e5e7eb':'#10B981';
  btn.children[0].style.transform=on?'translateX(0)':'translateX(16px)';
  btn.dataset.on=on?'0':'1';
}
function saveSettingsTabs(){
  var hidden=[].slice.call(document.querySelectorAll('[id^="tt-"]')).filter(function(b){return b.dataset.on==='0';}).map(function(b){return b.id.replace('tt-','');});

function addSettingItem(listId,prefix){
  var list=document.getElementById(listId);if(!list)return;

  var div=document.createElement('div');
  div.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:6px';

function submitBooking(){
  const d=S.modalData;
  const item={
    id:d.id||uid(),
    bookingNo:gv('f-bno')||nextLeadNo(),
    status:gv('f-bst')||'New',
    substatus:gv('f-bss')||'—',
    priority:gv('f-bpr')||'Medium',
    clientName:gv('f-bcn'),clientPhone:gv('f-bcp'),clientEmail:gv('f-bce'),
    service:gv('f-bsv'),city:gv('f-bcy'),source:gv('f-bsr'),
    vendorId:gv('f-bvd'),
    shootDate:gv('f-bsd'),deliveryDue:gv('f-bdd'),
    clientBudget:+gv('f-bbg')||0,quotedAmount:+gv('f-bqa')||0,
    vendorCost:+gv('f-bvc')||0,platformFee:+gv('f-bpf')||0,
    advancePaid:+gv('f-bap')||0,advanceVendor:d.advanceVendor||0,
    totalCollected:+gv('f-btc')||0,totalPaidVendor:d.totalPaidVendor||0,
    remarks:gv('f-brm'),
    comments:d.comments||[],deliverables:d.deliverables||[],
    review:d.review||null,quoteItems:d.quoteItems||[],
    followUps:d.followUps||[],googleReviewLink:d.googleReviewLink||'',
    advancePct:d.advancePct||30,
    createdAt:d.createdAt||today()
  };
  item.platformMargin=item.quotedAmount-item.vendorCost-item.platformFee;
  if(d.id)S.bookings=S.bookings.map(x=>x.id===d.id?item:x);
  else S.bookings.push(item);
  savB();
  atSync('Client Leads',d.id?'PATCH':'POST',null,{'Lead ID':item.bookingNo,'Client Name':item.clientName,'Phone':item.clientPhone,'Service':item.service,'City':item.city,'Status':item.status,'Quoted Amount':item.quotedAmount,'Priority':item.priority});
  closeModal();render();
}

function toggleVSvc(svc,el){
  const i=S.modalData._selSvcs.indexOf(svc);

  else{S.modalData._selSvcs.push(svc);el.style.background='#10B981';el.style.color='#fff';}
}


/* ═══ ACTIONS ═══ */
function saveClientDetails(id){
  const b=gB(id);if(!b)return;
  const name=document.getElementById('cd-name')?.value||b.clientName;
  const phone=document.getElementById('cd-phone')?.value||b.clientPhone;
  const email=document.getElementById('cd-email')?.value||b.clientEmail;
  const svc=document.getElementById('cd-svc')?.value||b.service;
  const city=document.getElementById('cd-city')?.value||b.city;
  const src=document.getElementById('cd-src')?.value||b.source;
  const bgt=+document.getElementById('cd-bgt')?.value||b.clientBudget||0;
  const rmk=document.getElementById('cd-rmk')?.value||'';
  S.bookings=S.bookings.map(x=>x.id===id?{...x,clientName:name,clientPhone:phone,clientEmail:email,service:svc,city:city,source:src,clientBudget:bgt,remarks:rmk}:x);
  savB();
  renderLeadDetail();
  // Show saved toast after re-render
  setTimeout(()=>{const ok=document.getElementById('cd-saved');if(ok)ok.textContent='✓ Saved!';},80);
  setTimeout(()=>{const ok=document.getElementById('cd-saved');if(ok)ok.textContent='';},3000);
}
function updBField(id,field,val){
  S.bookings=S.bookings.map(b=>b.id===id?{...b,[field]:val}:b);
  savB();
  if(S.lead===id)renderLeadDetail();
}
function syncSubstatusModal(status){
  const sel=document.getElementById('f-bss');if(!sel)return;
  const opts=SUBSTATUS[status]||['—'];
  sel.innerHTML=opts.map(s=>`<option>${s}</option>`).join('');
}
function updPayment(id,field,val){
  const b=gB(id);if(!b)return;
  const upd={[field]:val};
  if(field==='totalCollected'){if(val>=(b.quotedAmount||0)*0.99)upd.status='Shoot Completed';else if(val>0&&b.status==='Quote Shared')upd.status='Advance Paid';}
  S.bookings=S.bookings.map(x=>x.id===id?{...x,...upd}:x);
  addCommentToB(id,`${field} updated to ${INRf(val)}`,'payment');
  savB();renderLeadDetail();
}
function addCommentToB(id,text,type){
  const c={id:uid(),author:'Admin',text,ts:new Date().toISOString(),type:type||'note'};
  S.bookings=S.bookings.map(b=>b.id===id?{...b,comments:[...(b.comments||[]),c]}:b);
}
function addComment(bid){
  const inp=g('c-inp');if(!inp||!inp.value.trim())return;
  addCommentToB(bid,inp.value,'note');
  savB();inp.value='';renderLeadDetail();
}
function updQItem(bid,i,field,val){
  const b=gB(bid);if(!b)return;
  const qi=[...(b.quoteItems||[])];
  qi[i]={...qi[i],[field]:val};
  updBField(bid,'quoteItems',qi);
}
function addQItem(bid){
  const b=gB(bid);if(!b)return;
  updBField(bid,'quoteItems',[...(b.quoteItems||[]),{id:uid(),section:'Photography/Videography',desc:'',qty:1,rate:0}]);
  setTimeout(()=>renderLeadDetail(),50);
}
function rmQItem(bid,i){
  const b=gB(bid);if(!b)return;
  const qi=[...(b.quoteItems||[])];qi.splice(i,1);
  updBField(bid,'quoteItems',qi);setTimeout(()=>renderLeadDetail(),50);
}
function addDel(bid){
  const name=g('d-name')?.value,link=g('d-link')?.value,type=g('d-type')?.value||'Photos';
  if(!name||!link)return;
  const b=gB(bid);if(!b)return;
  updBField(bid,'deliverables',[...(b.deliverables||[]),{id:uid(),name,driveLink:link,type,uploadedAt:today()}]);
  setTimeout(()=>renderLeadDetail(),50);
}
function rmDel(bid,did){
  const b=gB(bid);if(!b)return;
  updBField(bid,'deliverables',(b.deliverables||[]).filter(d=>d.id!==did));
  setTimeout(()=>renderLeadDetail(),50);
}
function toggleFU(bid,fid){
  S.bookings=S.bookings.map(b=>b.id===bid?{...b,followUps:(b.followUps||[]).map(f=>f.id===fid?{...f,done:!f.done}:f)}:b);
  savB();if(S.lead)renderLeadDetail();else renderTab();
}
function delBooking(id){if(confirm('Delete this booking?')){S.bookings=S.bookings.filter(b=>b.id!==id);savB();renderTab();}}
function delVendor(id){if(confirm('Delete this vendor?')){S.vendors=S.vendors.filter(v=>v.id!==id);savV();renderTab();}}
function delExp(id){if(confirm('Delete?')){S.expenses=S.expenses.filter(e=>e.id!==id);savE();renderTab();}}
function delAd(id){if(confirm('Delete?')){S.ads=S.ads.filter(a=>a.id!==id);savA();renderTab();}}
function quickPay(bid){const a=prompt('Amount to pay:');if(a!==null){S.bookings=S.bookings.map(b=>b.id===bid?{...b,totalPaidVendor:(b.totalPaidVendor||0)+(+a||0)}:b);savB();renderTab();}}
function setTarget(key,val){const t=S.targets[thisMonth()]||{};t[key]=val;S.targets={...S.targets,[thisMonth()]:t};savT();}
function copyCreatorWA(vid){const v=gV(vid);if(!v)return;const msg=`Hi! Recommending *${v.name}* (${v.tier})\n📍 ${v.city} | ⭐ ${v.rating}\n💰 From ${INRf(v.baseRate)}\n🎯 ${(v.services||[]).join(', ')}\n\nInterested? I'll share the quote! 🎬\n_Team S2DIO ERA_`;navigator.clipboard.writeText(msg).then(()=>alert('Copied!'));}

/* ═══ CHARTS ═══ */
const CC=['#378ADD','#1D9E75','#BA7517','#7F77DD','#D85A30','#E24B4A','#0F6E56','#533F2B','#B45309','#7C3AED'];
function mkChart(id,type,labels,datasets,opts){
  const el=g(id);if(!el)return;
  if(S.charts[id])S.charts[id].destroy();
  try{S.charts[id]=new Chart(el,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:opts?.legend||false}},scales:opts?.noScales?{}:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:opts?.pct?v=>v+'%':opts?.money?v=>v>999?'₹'+(v/1000).toFixed(0)+'K':'₹'+v:undefined}}}}});}catch(e){}}

function mData(){
  return [0,1,2,3,4,5].map(i=>{const ms=`2026-0${i+1}`;const mb=S.bookings.filter(b=>b.createdAt?.startsWith(ms));const mg=mb.reduce((s,b)=>s+b.platformMargin,0);const ex=S.expenses.filter(e=>e.date.startsWith(ms)).reduce((s,e)=>s+e.amount,0);return{month:MONTHS[i],gmv:mb.reduce((s,b)=>s+b.quotedAmount,0),margin:mg,netProfit:mg-ex,collected:mb.reduce((s,b)=>s+b.totalCollected,0),bookings:mb.length,expenses:ex};});
}

function renderCharts(){
  const md=mData();
  /* Dashboard */
  if(g('ch-dash'))mkChart('ch-dash','bar',md.map(d=>d.month),[{label:'GMV',data:md.map(d=>d.gmv),backgroundColor:'#378ADD55',borderColor:'#378ADD',borderWidth:2},{label:'Margin',data:md.map(d=>d.margin),backgroundColor:'#1D9E7555',borderColor:'#1D9E75',borderWidth:2},{label:'Expenses',data:md.map(d=>d.expenses),backgroundColor:'#E24B4A55',borderColor:'#E24B4A',borderWidth:2}],{legend:true,money:true});
  if(g('ch-pipe')){const pSt=BSTATUS.filter(s=>S.bookings.some(b=>b.status===s));mkChart('ch-pipe','doughnut',pSt,pSt.map(s=>({data:[S.bookings.filter(b=>b.status===s).length]})).length===0?[]:[ {data:pSt.map(s=>S.bookings.filter(b=>b.status===s).length),backgroundColor:pSt.map(s=>SC[s]||'#888')}],{noScales:true,legend:false});}
  /* P&L */
  if(g('ch-pnl'))mkChart('ch-pnl','bar',md.map(d=>d.month),[{label:'Margin',data:md.map(d=>d.margin),backgroundColor:'#1D9E7555',borderColor:'#1D9E75',borderWidth:2},{label:'Net Profit',data:md.map(d=>d.netProfit),backgroundColor:'#10B98155',borderColor:'#10B981',borderWidth:2}],{legend:true,money:true});
  if(g('ch-exp')){const cats=ECATS.filter(c=>S.expenses.some(e=>e.cat===c));mkChart('ch-exp','doughnut',cats,[{data:cats.map(c=>S.expenses.filter(e=>e.cat===c).reduce((s,e)=>s+e.amount,0)),backgroundColor:CC}],{noScales:true});}
  /* Ads */
  const src=SOURCES.filter(s=>S.bookings.some(b=>b.source===s));
  if(g('ch-src'))mkChart('ch-src','bar',src,[{data:src.map(s=>S.bookings.filter(b=>b.source===s).length),backgroundColor:CC}],{money:false});
  if(g('ch-sgmv'))mkChart('ch-sgmv','bar',src,[{data:src.map(s=>S.bookings.filter(b=>b.source===s).reduce((x,b)=>x+b.quotedAmount,0)),backgroundColor:'#10B98188'}],{money:true});
  /* Analytics */
  if(g('ch-svc')){const sd=SERVICES.filter(s=>S.bookings.some(b=>b.service===s));mkChart('ch-svc','bar',sd,[{data:sd.map(s=>S.bookings.filter(b=>b.service===s).reduce((x,b)=>x+b.quotedAmount,0)),backgroundColor:CC}],{money:true});}
  if(g('ch-funnel')){const fd=BSTATUS.filter(s=>S.bookings.some(b=>b.status===s));mkChart('ch-funnel','bar',fd,[{data:fd.map(s=>S.bookings.filter(b=>b.status===s).length),backgroundColor:fd.map(s=>SC[s]||'#888')}],{});}
  if(g('ch-repeat')){const ph=S.bookings.map(b=>b.clientPhone),rep=ph.filter((p,i)=>ph.indexOf(p)<i).length;mkChart('ch-repeat','doughnut',['New','Repeat'],[{data:[S.bookings.length-rep,rep],backgroundColor:['#378ADD','#10B981']}],{noScales:true});}
  /* Break-even */
  if(g('ch-be')){
    const tm=S.bookings.filter(b=>b.createdAt?.startsWith(thisMonth()));
    const fc=S.expenses.filter(e=>e.type==='fixed'&&e.date.startsWith(thisMonth())).reduce((s,e)=>s+e.amount,0);
    const days=new Date().getDate();
    const labs=[],margins=[];
    for(let i=1;i<=days;i++){const d=`${thisMonth()}-${String(i).padStart(2,'0')}`;labs.push(i);margins.push(tm.filter(b=>b.createdAt<=d).reduce((s,b)=>s+b.platformMargin,0));}
    mkChart('ch-be','line',labs,[{label:'Cumul. Margin',data:margins,borderColor:'#10B981',backgroundColor:'#10B98122',fill:true},{label:'Break-even',data:Array(days).fill(fc),borderColor:'#EF4444',borderDash:[5,5]}],{legend:true,money:true});
  }
  /* Investor */
  if(g('ch-inv'))mkChart('ch-inv','line',md.map(d=>d.month),[{label:'GMV',data:md.map(d=>d.gmv),borderColor:'#378ADD',tension:0.4,fill:false},{label:'Net Revenue',data:md.map(d=>d.margin),borderColor:'#10B981',tension:0.4,fill:false},{label:'Net Profit',data:md.map(d=>d.netProfit),borderColor:'#1D9E75',tension:0.4,borderDash:[5,5],fill:false}],{legend:true,money:true});
}


function pjUpdate(){
  const gv=id=>document.getElementById(id)?.value||'';
  const jt=gv('pj-jt'),loc=gv('pj-loc'),dt=gv('pj-dt')||'TBD',dur=gv('pj-dur'),
        ph=gv('pj-ph'),vh=gv('pj-vh'),ch=gv('pj-ch'),
        dr=gv('pj-dr')||'Optional',pkg=gv('pj-pkg'),bgt=gv('pj-bgt')||'Need to share Budget',
        trvl=gv('pj-trvl')||'Not Included',spec=gv('pj-spec'),
        ddl=gv('pj-ddl')||'Today by 8pm',con=gv('pj-con')||'Your Name + Number + Work Link';
  const crew=[ph?ph+' Photographer(s)':'',vh?vh+' Videographer(s)':'',ch?ch+' Cinematographer(s)':''].filter(Boolean).join(', ')||'TBD';
  const msg='🎬 SHOOT AVAILABLE — '+dt+' | '+loc+'\n\n📋 Job: '+jt+'\n📍 Location: '+loc+'\n⏰ Duration: '+(dur||'TBD')+'\n👥 Need: '+crew+'\n🚁 Drone: '+dr+'\n📦 Package: '+(pkg||'TBD')+'\n💰 Rate: \u20b9'+bgt+'\n🚌 Travel: '+trvl+'\n✨ Special: '+(spec||'NA')+'\n✅ Confirm by: '+ddl+'\n📞 Respond to: '+con+'\n\nReply YES to confirm availability. First confirmed gets the job!\n\nPlease share: Your full name | Service | Any questions\n#PhotographyJob #FreelanceWork';
  const el=document.getElementById('pj-preview-text');if(el)el.textContent=msg;
  const out=document.getElementById('pj-out');if(out)out.value=msg;
}
function pjCopy(){
  const msg=document.getElementById('pj-out')?.value||document.getElementById('pj-preview-text')?.textContent||'';
  if(!msg||msg.includes('Fill the form'))return alert('Fill the form fields first!');
  navigator.clipboard.writeText(msg).then(()=>alert('Copied! Paste in WhatsApp group 📱'));
}

/* ═══ INIT ═══ */
document.addEventListener('DOMContentLoaded',()=>{
  initData();
  render();
  // pj fields live update
  document.addEventListener('input', e=>{if(e.target?.id?.startsWith('pj-'))pjUpdate();});
});

</script>
