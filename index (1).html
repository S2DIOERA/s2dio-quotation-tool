<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>S2DIO ERA — Quotation Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
  .topbar{background:#111;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:16px;font-weight:600;letter-spacing:-0.3px}
  .topbar span{font-size:11px;color:#aaa}
  .container{max-width:860px;margin:24px auto;padding:0 16px 40px}
  .card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px 24px;margin-bottom:16px}
  .card-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;font-weight:500;color:#666}
  .field input,.field select,.field textarea{
    border:1px solid #e0e0e0;border-radius:8px;padding:9px 12px;
    font-size:14px;font-family:inherit;color:#1a1a1a;
    transition:border 0.15s;background:#fff;width:100%
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:#111;box-shadow:0 0 0 3px rgba(0,0,0,0.06)
  }
  .field textarea{min-height:72px;resize:vertical}
  .airtable-bar{background:#f0f7ff;border:1px solid #c8e0ff;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .airtable-bar label{font-size:13px;font-weight:500;color:#2563eb;white-space:nowrap}
  .airtable-bar input{flex:1;min-width:200px;border:1px solid #c8e0ff;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff}
  .airtable-bar button{padding:8px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
  .airtable-bar button:hover{background:#1d4ed8}
  .lead-select{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .lead-select select{flex:1;min-width:200px;border:1px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:13px}
  .lead-select button{padding:9px 16px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
  .lead-select button:hover{background:#047857}
  table.sv{width:100%;border-collapse:collapse}
  table.sv th{font-size:11px;color:#888;font-weight:600;text-align:left;padding:8px 8px 6px;border-bottom:1px solid #f0f0f0;background:#fafafa}
  table.sv td{padding:5px 6px;border-bottom:1px solid #f7f7f7;vertical-align:middle}
  table.sv input{border:1px solid transparent;border-radius:6px;padding:6px 8px;font-size:13px;width:100%;background:transparent;font-family:inherit}
  table.sv input:focus{outline:none;border-color:#d0d0d0;background:#fff}
  .del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:18px;padding:0 4px;line-height:1}
  .del-btn:hover{color:#e53e3e}
  .add-row-btn{width:100%;margin-top:8px;padding:9px;border:1.5px dashed #d0d0d0;border-radius:8px;background:transparent;font-size:13px;color:#888;cursor:pointer;font-family:inherit}
  .add-row-btn:hover{border-color:#999;color:#555;background:#fafafa}
  .totals{margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0}
  .trow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px;color:#666}
  .trow input,.trow select{font-size:13px;width:90px;text-align:right;border:1px solid #e0e0e0;border-radius:6px;padding:5px 8px;font-family:inherit}
  .trow.grand{font-size:17px;font-weight:700;color:#111;border-top:2px solid #111;padding-top:12px;margin-top:8px}
  .trow.adv{color:#059669;font-weight:600}
  .btn-row{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;padding:13px 10px;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;border:none;transition:opacity 0.15s}
  .btn:hover{opacity:0.88}
  .btn-wa{background:#25D366;color:#fff}
  .btn-pdf{background:#111;color:#fff}
  .btn-pre{background:#f0f0f0;color:#333;border:1px solid #ddd}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;font-weight:500}
  .toast.show{opacity:1}
  .status-tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;background:#dcfce7;color:#166534}
  .status-tag.error{background:#fee2e2;color:#991b1b}
  @media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.btn-row{flex-direction:column}}
</style>
</head>
<body>

<div class="topbar">
  <h1>S2DIO ERA — Quotation Generator</h1>
  <span>Team Internal Tool</span>
</div>

<div class="container">

  <!-- Airtable Token Setup -->
  <div class="airtable-bar" id="token-bar">
    <label>🔑 Airtable Token:</label>
    <input type="password" id="at-token" placeholder="Paste your Personal Access Token here"/>
    <button onclick="saveToken()">Connect</button>
    <span id="token-status" style="font-size:12px;color:#666"></span>
  </div>

  <!-- Load from Airtable -->
  <div class="card" id="load-card" style="display:none">
    <div class="card-title">Load from Airtable — Client Lead</div>
    <div class="lead-select">
      <select id="lead-select"><option value="">-- Select a lead to auto-fill --</option></select>
      <button onclick="loadLead()">Auto-fill</button>
    </div>
  </div>

  <!-- Client Details -->
  <div class="card">
    <div class="card-title">Client details</div>
    <div class="grid2">
      <div class="field"><label>Client name *</label><input id="cn" placeholder="Rahul Sharma"/></div>
      <div class="field"><label>WhatsApp number *</label><input id="cp" placeholder="+91 98765 43210"/></div>
      <div class="field"><label>Email</label><input id="ce" placeholder="client@email.com"/></div>
      <div class="field"><label>Location</label><input id="cl" placeholder="Gurgaon, Delhi NCR"/></div>
      <div class="field"><label>Shoot date</label><input id="cd" type="date"/></div>
      <div class="field"><label>Duration</label><input id="cdu" placeholder="3-4 Hours / Full Day"/></div>
    </div>
    <div class="field" style="margin-top:12px">
      <label>Shoot type / event</label>
      <input id="ct" placeholder="Wedding / Corporate / Product / Web Series"/>
    </div>
  </div>

  <!-- Services -->
  <div class="card">
    <div class="card-title">Services & pricing</div>
    <table class="sv">
      <thead>
        <tr>
          <th style="width:28%">Service</th>
          <th style="width:28%">Description</th>
          <th style="width:8%">Qty</th>
          <th style="width:16%">Rate (₹)</th>
          <th style="width:16%">Amount (₹)</th>
          <th style="width:4%"></th>
        </tr>
      </thead>
      <tbody id="sb"></tbody>
    </table>
    <button class="add-row-btn" onclick="addRow()">+ Add service</button>

    <div class="totals">
      <div class="trow"><span>Subtotal</span><span id="ts">₹0</span></div>
      <div class="trow"><span>Discount (₹)</span><input id="disc" type="number" value="0" min="0" onchange="calc()"/></div>
      <div class="trow">
        <span>GST (%)</span>
        <select id="gst" onchange="calc()">
          <option value="0">0%</option>
          <option value="5">5%</option>
          <option value="12">12%</option>
          <option value="18">18%</option>
        </select>
      </div>
      <div class="trow"><span>GST amount</span><span id="tg">₹0</span></div>
      <div class="trow grand"><span>Total amount</span><span id="tt">₹0</span></div>
      <div class="trow adv">
        <span>
          Advance required
          <select id="advp" onchange="calc()" style="font-size:13px;border:1px solid #d0d0d0;border-radius:6px;padding:3px 6px;font-weight:600;color:#059669">
            <option value="30">30%</option>
            <option value="40">40%</option>
            <option value="50">50%</option>
          </select>
        </span>
        <span id="ta">₹0</span>
      </div>
    </div>
  </div>

  <!-- Notes & Terms -->
  <div class="card">
    <div class="card-title">Additional details</div>
    <div class="grid2">
      <div class="field"><label>Prepared by</label><input id="pb" placeholder="Your name"/></div>
      <div class="field"><label>Valid until</label><input id="vu" type="date"/></div>
    </div>
    <div class="field" style="margin-top:12px">
      <label>Services included / special notes</label>
      <textarea id="nt" placeholder="e.g. Sony A7C II cameras, Gimbal support included, 2 edited reels, delivery within 7 working days..."></textarea>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="btn-row">
    <button class="btn btn-pre" onclick="showPrev()">👁 Preview</button>
    <button class="btn btn-wa" onclick="openWA()">💬 WhatsApp</button>
    <button class="btn btn-pdf" onclick="makePDF()">⬇ Download PDF</button>
  </div>

  <!-- Save to Airtable Button -->
  <div style="margin-top:12px">
    <button onclick="saveQuotation()" style="width:100%;padding:12px;background:#f0f7ff;border:1.5px solid #c8e0ff;border-radius:10px;font-size:14px;font-weight:600;color:#2563eb;cursor:pointer;font-family:inherit">
      💾 Save Quotation to Airtable + Update Lead Status → "Quoted"
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const BASE_ID = 'appfJtOaBCSpLQ1GN';
const LEADS_TABLE = 'Client Leads';
const QUOT_TABLE = 'Quotation';

// ─── TOKEN ────────────────────────────────────────────────
function saveToken(){
  const t = document.getElementById('at-token').value.trim();
  if(!t){toast('Token daalo pehle!');return;}
  localStorage.setItem('at_token', t);
  document.getElementById('token-status').innerHTML = '<span class="status-tag">Connected ✓</span>';
  loadLeads();
}

function getToken(){
  const saved = localStorage.getItem('at_token');
  if(saved){
    document.getElementById('at-token').value = '••••••••••••••••';
    document.getElementById('token-status').innerHTML = '<span class="status-tag">Connected ✓</span>';
    return saved;
  }
  return null;
}

// ─── LOAD LEADS ───────────────────────────────────────────
async function loadLeads(){
  const token = getToken() || localStorage.getItem('at_token');
  if(!token) return;
  document.getElementById('load-card').style.display = 'block';
  try {
    const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(LEADS_TABLE)}?fields[]=Client+Name&fields[]=Phone&fields[]=Email&fields[]=City&fields[]=Area&fields[]=Service+Needed&fields[]=Shoot+Type&fields[]=Shoot+Date&fields[]=Budget+Range&fields[]=Requirement&maxRecords=50`;
    const res = await fetch(url, {headers:{Authorization:`Bearer ${token}`}});
    const data = await res.json();
    if(data.error){toast('Token galat hai! Check karo.');return;}
    const sel = document.getElementById('lead-select');
    sel.innerHTML = '<option value="">-- Select a lead to auto-fill --</option>';
    data.records.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.id;
      opt.textContent = `${r.fields['Client Name'] || 'Unknown'} — ${r.fields['City'] || ''}`;
      opt.dataset.fields = JSON.stringify(r.fields);
      sel.appendChild(opt);
    });
    toast('Leads loaded from Airtable!');
  } catch(e){
    toast('Connection error! Token check karo.');
  }
}

function loadLead(){
  const sel = document.getElementById('lead-select');
  const opt = sel.options[sel.selectedIndex];
  if(!opt.value){toast('Ek lead select karo!');return;}
  const f = JSON.parse(opt.dataset.fields);
  document.getElementById('cn').value = f['Client Name'] || '';
  document.getElementById('cp').value = f['Phone'] || '';
  document.getElementById('ce').value = f['Email'] || '';
  document.getElementById('cl').value = (f['City']||'') + (f['Area'] ? ', '+f['Area'] : '');
  document.getElementById('ct').value = f['Shoot Type'] || '';
  if(f['Shoot Date']) document.getElementById('cd').value = f['Shoot Date'].slice(0,10);
  document.getElementById('nt').value = f['Requirement'] || '';
  // Auto-fill services based on service needed
  if(f['Service Needed']){
    const svcs = Array.isArray(f['Service Needed']) ? f['Service Needed'] : [f['Service Needed']];
    document.getElementById('sb').innerHTML = '';
    svcs.forEach(s => addRow({s, d:'Professional '+s, q:1, r:0}));
  }
  toast('Lead auto-filled!');
}

// ─── SERVICES TABLE ───────────────────────────────────────
const defaults = [
  {s:'Photography',d:'Professional photographer',q:1,r:0},
  {s:'Videography',d:'Video coverage',q:1,r:0},
  {s:'Photo editing',d:'Post-processing + delivery',q:1,r:0},
  {s:'Video editing',d:'Edit + color grade',q:1,r:0},
];

function addRow(s = {s:'',d:'',q:1,r:0}){
  const tb = document.getElementById('sb');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input value="${s.s}" placeholder="Service name" onchange="calc()"/></td>
    <td><input value="${s.d}" placeholder="Description"/></td>
    <td><input type="number" value="${s.q}" min="1" style="width:50px" onchange="calc()"/></td>
    <td><input type="number" value="${s.r}" min="0" onchange="calc()"/></td>
    <td style="text-align:right;color:#666;font-size:13px;padding-right:8px" class="am">₹0</td>
    <td><button class="del-btn" onclick="this.closest('tr').remove();calc()">×</button></td>`;
  tb.appendChild(tr);
  calc();
}

function calc(){
  const rows = document.querySelectorAll('#sb tr');
  let sub = 0;
  rows.forEach(r => {
    const inp = r.querySelectorAll('input');
    const q = parseFloat(inp[2]?.value)||0, rate = parseFloat(inp[3]?.value)||0;
    const a = q * rate;
    r.querySelector('.am').textContent = '₹' + a.toLocaleString('en-IN');
    sub += a;
  });
  const disc = parseFloat(document.getElementById('disc').value)||0;
  const gp = parseFloat(document.getElementById('gst').value)||0;
  const ap = parseFloat(document.getElementById('advp').value)||30;
  const after = sub - disc;
  const ga = Math.round(after * gp / 100);
  const tot = after + ga;
  const adv = Math.round(tot * ap / 100);
  document.getElementById('ts').textContent = '₹' + sub.toLocaleString('en-IN');
  document.getElementById('tg').textContent = '₹' + ga.toLocaleString('en-IN');
  document.getElementById('tt').textContent = '₹' + tot.toLocaleString('en-IN');
  document.getElementById('ta').textContent = '₹' + adv.toLocaleString('en-IN');
}

// ─── GET ALL DATA ─────────────────────────────────────────
function getData(){
  const rows = document.querySelectorAll('#sb tr');
  const svcs = [];
  rows.forEach(r => {
    const inp = r.querySelectorAll('input');
    const s = inp[0]?.value, q = parseFloat(inp[2]?.value)||0, rate = parseFloat(inp[3]?.value)||0;
    if(s||rate>0) svcs.push({s, d:inp[1]?.value||'', q, rate, amt:q*rate});
  });
  const sub = svcs.reduce((a,s)=>a+s.amt,0);
  const disc = parseFloat(document.getElementById('disc').value)||0;
  const gp = parseFloat(document.getElementById('gst').value)||0;
  const ap = parseFloat(document.getElementById('advp').value)||30;
  const after = sub - disc;
  const ga = Math.round(after*gp/100);
  const tot = after + ga;
  const adv = Math.round(tot*ap/100);
  return {
    cn: document.getElementById('cn').value || 'Client',
    cp: document.getElementById('cp').value,
    ce: document.getElementById('ce').value,
    cl: document.getElementById('cl').value,
    cd: document.getElementById('cd').value,
    cdu: document.getElementById('cdu').value,
    ct: document.getElementById('ct').value,
    pb: document.getElementById('pb').value,
    vu: document.getElementById('vu').value,
    nt: document.getElementById('nt').value,
    svcs, sub, disc, gp, ga, tot, adv, ap
  };
}

// ─── PREVIEW ──────────────────────────────────────────────
function showPrev(){
  const d = getData();
  const sl = d.svcs.map(s=>`• ${s.s} (x${s.q}) — ₹${s.amt.toLocaleString('en-IN')}`).join('\n');
  alert(`QUOTATION PREVIEW — S2DIO ERA\n${'─'.repeat(35)}\nClient: ${d.cn}  |  Phone: ${d.cp}\nLocation: ${d.cl}  |  Date: ${d.cd}\nType: ${d.ct}\n\nSERVICES:\n${sl}\n\nSubtotal: ₹${d.sub.toLocaleString('en-IN')}${d.disc>0?'\nDiscount: -₹'+d.disc:''}\nGST (${d.gp}%): ₹${d.ga.toLocaleString('en-IN')}\n${'─'.repeat(35)}\nTOTAL: ₹${d.tot.toLocaleString('en-IN')}\nADVANCE (${d.ap}%): ₹${d.adv.toLocaleString('en-IN')}\n${'─'.repeat(35)}\n${d.nt||''}`);
}

// ─── WHATSAPP ─────────────────────────────────────────────
function openWA(){
  const d = getData();
  if(!d.cp){toast('WhatsApp number daalo!');return;}
  const sl = d.svcs.filter(s=>s.amt>0).map(s=>`  • ${s.s} (x${s.q}) — ₹${s.amt.toLocaleString('en-IN')}`).join('\n');
  const msg = `📄 *QUOTATION — S2DIO ERA*\n\nHi ${d.cn},\n\nThank you for reaching out! Your quotation:\n\n📍 *Location:* ${d.cl||'—'}\n📅 *Date:* ${d.cd||'—'}\n⏱ *Duration:* ${d.cdu||'—'}\n🎯 *Type:* ${d.ct||'—'}\n\n*Services:*\n${sl}${d.disc>0?`\n💸 Discount: ₹${d.disc.toLocaleString('en-IN')}`:''}\n${d.gp>0?`🧾 GST (${d.gp}%): ₹${d.ga.toLocaleString('en-IN')}`:''}${d.nt?`\n\n✨ *Includes:*\n${d.nt}`:''}\n\n━━━━━━━━━━━━\n💰 *TOTAL: ₹${d.tot.toLocaleString('en-IN')}*\n✅ *Advance (${d.ap}%): ₹${d.adv.toLocaleString('en-IN')}*\n━━━━━━━━━━━━\n\n📌 Advance confirms booking.\n📦 Deliverables as per agreed timeline.\n\n_Regards,_\n*S2DIO ERA*\n_Photography • Videography • Creative Production_\n_s2dioera.com_`;
  const num = d.cp.replace(/\D/g,'');
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ─── PDF ──────────────────────────────────────────────────
function makePDF(){
  const d = getData();
  if(typeof window.jspdf === 'undefined'){toast('PDF library load ho rahi hai, 5 sec mein dobara try karo...');return;}
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const W = 210, M = 20;
  let y = 0;

  // Header
  doc.setFillColor(17,17,17);
  doc.rect(0,0,W,20,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text('S2DIO ERA',M,12);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('Photography  •  Videography  •  Creative Production',M,17);
  doc.setFontSize(8);
  doc.text('s2dioera.com',W-M,12,{align:'right'});
  doc.text('Search. Select. Shoot.',W-M,17,{align:'right'});
  y = 30;

  // Title
  doc.setTextColor(17,17,17);
  doc.setFontSize(22);doc.setFont('helvetica','bold');
  doc.text('QUOTATION',M,y);
  const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
  doc.text(`Date: ${today}`,W-M,y,{align:'right'});
  if(d.ct){doc.setFontSize(11);doc.setTextColor(80,80,80);doc.text(d.ct,M,y+7);}
  y += 16;

  doc.setDrawColor(230,230,230);doc.setLineWidth(0.4);
  doc.line(M,y,W-M,y);y += 8;

  // Client
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(120,120,120);
  doc.text('CLIENT DETAILS',M,y);y += 6;
  doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);doc.setFontSize(10);
  const cdRows = [[`Client: ${d.cn}`,`Phone: ${d.cp}`],[`Email: ${d.ce||'—'}`,`Location: ${d.cl||'—'}`],[`Shoot Date: ${d.cd||'—'}`,`Duration: ${d.cdu||'—'}`]];
  cdRows.forEach(row => {
    doc.text(row[0],M,y);doc.text(row[1],W/2,y);y+=6;
  });
  y += 4;

  doc.line(M,y,W-M,y);y += 8;
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(120,120,120);
  doc.text('SERVICES',M,y);y += 5;

  // Services table header
  const cols = [M, M+52, M+100, M+122, M+150];
  doc.setFillColor(248,248,248);
  doc.rect(M,y-3,W-2*M,8,'F');
  doc.setFont('helvetica','bold');doc.setTextColor(80,80,80);doc.setFontSize(9);
  ['Service','Description','Qty','Rate (₹)','Amount (₹)'].forEach((h,i)=>doc.text(h,cols[i],y+1));
  y += 7;

  doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);
  d.svcs.forEach((s,i) => {
    if(i%2===0){doc.setFillColor(252,252,252);doc.rect(M,y-3,W-2*M,8,'F');}
    doc.setFontSize(9);
    doc.text(s.s||'',cols[0],y,{maxWidth:48});
    doc.text(s.d||'',cols[1],y,{maxWidth:44});
    doc.text(String(s.q),cols[2],y);
    doc.text('₹'+s.rate.toLocaleString('en-IN'),cols[3],y);
    doc.text('₹'+s.amt.toLocaleString('en-IN'),cols[4],y);
    y += 8;
  });
  y += 4;

  // Totals
  doc.line(M,y,W-M,y);y += 6;
  const totLines = [
    ['Subtotal','₹'+d.sub.toLocaleString('en-IN')],
    ...(d.disc>0?[['Discount','-₹'+d.disc.toLocaleString('en-IN')]]:[]),
    ...(d.gp>0?[['GST ('+d.gp+'%)','₹'+d.ga.toLocaleString('en-IN')]]:[]),
  ];
  totLines.forEach(([l,v]) => {
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
    doc.text(l,W-M-55,y);doc.text(v,W-M,y,{align:'right'});y+=5;
  });
  doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(17,17,17);
  doc.text('TOTAL AMOUNT',W-M-65,y);
  doc.text('₹'+d.tot.toLocaleString('en-IN'),W-M,y,{align:'right'});y+=7;
  doc.setFontSize(10);doc.setTextColor(5,150,105);
  doc.text(`Advance Required (${d.ap}%): ₹${d.adv.toLocaleString('en-IN')}`,W-M-80,y);
  y += 10;

  // Notes
  if(d.nt){
    doc.line(M,y,W-M,y);y+=6;
    doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(120,120,120);
    doc.text('SERVICES INCLUDED / NOTES',M,y);y+=5;
    doc.setFont('helvetica','normal');doc.setTextColor(50,50,50);
    const lines = doc.splitTextToSize(d.nt,W-2*M);
    doc.text(lines,M,y);y+=lines.length*5+4;
  }

  // Terms
  y+=2;doc.line(M,y,W-M,y);y+=6;
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(120,120,120);
  doc.text('TERMS & CONDITIONS',M,y);y+=5;
  doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  const terms = [
    `• ${d.ap}% advance required to confirm booking.`,
    '• Remaining amount payable on/before shoot day.',
    '• Edited photos/videos delivered within mutually agreed timeline.',
    '• All raw data handed over after full payment.',
    '• Cancellation: advance non-refundable if cancelled within 48 hrs.',
    ...(d.vu?[`• Quotation valid until: ${d.vu}`]:[]),
    ...(d.pb?[`• Prepared by: ${d.pb}`]:[]),
  ];
  terms.forEach(t=>{doc.text(t,M,y);y+=4.5;});

  // Footer
  doc.setFillColor(245,245,245);
  doc.rect(0,282,W,15,'F');
  doc.setFontSize(8);doc.setTextColor(130,130,130);
  doc.text('S2DIO ERA  |  Instant Studio & Creator Booking Platform  |  s2dioera.com',W/2,289,{align:'center'});
  doc.text('Photography • Videography • Creative Production • Drone • Studio Booking',W/2,293,{align:'center'});

  const fname = `S2DIO-Quotation-${d.cn.replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(fname);
  toast('PDF downloaded!');
}

// ─── SAVE TO AIRTABLE ─────────────────────────────────────
async function saveQuotation(){
  const token = localStorage.getItem('at_token');
  if(!token){toast('Pehle Airtable connect karo!');return;}
  const d = getData();
  const sel = document.getElementById('lead-select');
  const leadId = sel.value;

  // Build services summary
  const svcSummary = d.svcs.map(s=>`${s.s} x${s.q} = ₹${s.amt.toLocaleString('en-IN')}`).join(' | ');

  // Save to Quotation table
  const body = {
    fields: {
      'Quotation Date': new Date().toISOString().slice(0,10),
      'Shoot Type': d.ct||'',
      'Total Amount': d.tot,
      'Advance 30%': d.adv,
      'Notes': svcSummary + (d.nt ? '\n\n' + d.nt : ''),
    }
  };

  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(QUOT_TABLE)}`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if(data.error){toast('Save failed: '+data.error.message);return;}

    // Update lead status to Quoted
    if(leadId){
      await fetch(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(LEADS_TABLE)}/${leadId}`,{
        method:'PATCH',
        headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
        body: JSON.stringify({fields:{'Status':'Quoted','Substatus':'Quote Sent'}})
      });
    }
    toast('Saved to Airtable! Lead status → Quoted ✓');
  } catch(e){
    toast('Error saving. Check connection.');
  }
}

// ─── TOAST ────────────────────────────────────────────────
function toast(m){
  const t = document.getElementById('toast');
  t.textContent = m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ─── INIT ─────────────────────────────────────────────────
window.onload = () => {
  defaults.forEach(s => addRow(s));
  const saved = localStorage.getItem('at_token');
  if(saved){
    document.getElementById('at-token').value = '••••••••••••••';
    document.getElementById('token-status').innerHTML = '<span class="status-tag">Connected ✓</span>';
    loadLeads();
  }
};
